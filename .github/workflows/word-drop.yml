name: Build Word Drop (Mac + Windows)

on:
  push:
    tags:
      - 'word-drop-v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: source/word-drop
        run: npm install
      - name: Build Mac DMG
        working-directory: source/word-drop
        run: npx electron-builder --mac --arm64 --publish=never
      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: word-drop-mac-dmg
          path: source/word-drop/dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: source/word-drop
        run: npm install
      - name: Build Windows installer
        working-directory: source/word-drop
        run: npx electron-builder --win --x64 --publish=never
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: word-drop-windows-exe
          path: source/word-drop/dist/*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: word-drop-mac-dmg
          path: ./release
      - uses: actions/download-artifact@v4
        with:
          name: word-drop-windows-exe
          path: ./release
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/*.dmg
            ./release/*.exe
          tag_name: ${{ github.ref_name }}
          name: Word Drop ${{ github.ref_name }}
          generate_release_notes: true
