name: Build Countdown (Mac + Windows)

on:
  push:
    tags:
      - 'countdown-v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: source/countdown
        run: npm install
      - name: Build Mac DMG (signed + notarized)
        working-directory: source/countdown
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --arm64 --publish=never
      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: countdown-mac-dmg
          path: source/countdown/dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: source/countdown
        run: npm install
      - name: Build Windows installer
        working-directory: source/countdown
        run: npx electron-builder --win --x64 --publish=never
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: countdown-windows-exe
          path: source/countdown/dist/*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: countdown-mac-dmg
          path: ./release
      - uses: actions/download-artifact@v4
        with:
          name: countdown-windows-exe
          path: ./release
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/*.dmg
            ./release/*.exe
          tag_name: ${{ github.ref_name }}
          name: Countdown ${{ github.ref_name }}
          generate_release_notes: true
