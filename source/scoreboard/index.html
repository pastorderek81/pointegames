<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#f59e0b;--cyan:#22d3ee;--purple:#a855f7;--red:#ef4444;--green:#4ade80;--bg:#030304;--surface:#0a0a0c;--border:#1a1a1e;}
html,body{width:100%;height:100%;background:var(--bg);color:#fff;font-family:'Nunito',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
input{outline:none;font-family:inherit;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}

/* ── LOBBY ── */
#lobby{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;background:radial-gradient(ellipse at 50% 0%,#1a1a00 0%,#030304 60%);z-index:100;}
.lobby-title{font-family:'Black Ops One',sans-serif;font-size:clamp(32px,8vw,72px);letter-spacing:6px;color:var(--gold);text-shadow:0 0 40px rgba(245,158,11,.5),0 0 80px rgba(245,158,11,.2);margin-bottom:8px;}
.lobby-sub{font-size:clamp(11px,2.5vw,14px);color:#444;letter-spacing:3px;text-transform:uppercase;margin-bottom:48px;}
.lobby-card{background:#0a0a0c;border:1px solid #1a1a1e;border-radius:20px;padding:32px;width:min(420px,90vw);display:flex;flex-direction:column;gap:16px;}
.lobby-label{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;}
.lobby-input{width:100%;padding:14px 16px;background:#060608;border:1px solid #222;border-radius:10px;color:#fff;font-size:18px;font-family:'Barlow Condensed',sans-serif;letter-spacing:4px;text-transform:uppercase;}
.lobby-input::placeholder{color:#333;letter-spacing:2px;}
.lobby-divider{display:flex;align-items:center;gap:12px;color:#222;font-size:11px;}
.lobby-divider::before,.lobby-divider::after{content:'';flex:1;height:1px;background:#1a1a1e;}
.btn-primary{padding:15px;background:linear-gradient(135deg,var(--gold),#d97706);color:#000;font-family:'Black Ops One',sans-serif;font-size:16px;letter-spacing:3px;border-radius:10px;box-shadow:0 4px 20px rgba(245,158,11,.3);}
.btn-primary:active{transform:scale(.97);}
.btn-secondary{padding:15px;background:transparent;color:#444;border:1px solid #1a1a1e;font-family:'Black Ops One',sans-serif;font-size:16px;letter-spacing:3px;border-radius:10px;}

/* ── OPERATOR ── */
#operator{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
.op-topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#030304;border-bottom:1px solid #111;flex-shrink:0;min-height:52px;}
.op-title{font-family:'Black Ops One',sans-serif;font-size:15px;letter-spacing:3px;color:var(--gold);}
.op-room{font-size:11px;color:#333;letter-spacing:2px;}
.op-topbtns{display:flex;gap:8px;align-items:center;}
.op-btn{padding:6px 12px;background:#0e0e10;color:#555;border:1px solid #111;border-radius:7px;font-size:11px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;font-weight:700;}
.op-scroll{flex:1;overflow-y:auto;padding:12px 14px;}
.section-label{font-size:9px;color:var(--gold);font-weight:900;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;margin-top:16px;}

/* Team cards (operator) */
.team-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.team-card{display:flex;align-items:center;gap:10px;padding:14px;background:#0a0a0c;border:2px solid #1a1a1e;border-radius:12px;transition:border-color .2s;}
.team-color{width:16px;height:40px;border-radius:6px;flex-shrink:0;}
.team-name-display{flex:1;font-family:'Black Ops One',sans-serif;font-size:18px;letter-spacing:2px;}
.team-score-display{font-family:'Black Ops One',sans-serif;font-size:28px;letter-spacing:2px;min-width:60px;text-align:right;}
.team-btns{display:flex;gap:4px;flex-shrink:0;}
.pts-btn{width:44px;height:44px;border-radius:8px;font-family:'Black Ops One',sans-serif;font-size:14px;display:flex;align-items:center;justify-content:center;transition:transform .1s;}
.pts-btn:active{transform:scale(.9);}
.pts-btn.add{background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.2);}
.pts-btn.sub{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.15);}
.pts-btn.big-add{background:rgba(74,222,128,.25);color:var(--green);border:1px solid rgba(74,222,128,.3);font-size:11px;}

/* Setup */
.setup-team{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.setup-team input{flex:1;padding:10px 14px;background:#0e0e10;border:1px solid #1a1a1e;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:2px;font-weight:700;}
.del-btn{width:32px;height:32px;background:#1a0000;color:var(--red);border:1px solid #2a0000;border-radius:7px;font-size:14px;flex-shrink:0;}
.add-btn{padding:11px;background:var(--gold);color:#000;font-family:'Black Ops One',sans-serif;font-size:14px;letter-spacing:2px;border-radius:8px;width:100%;}
.start-btn{width:100%;margin-top:12px;padding:17px;background:linear-gradient(135deg,var(--gold),#d97706);color:#000;font-family:'Black Ops One',sans-serif;font-size:18px;letter-spacing:4px;border-radius:10px;box-shadow:0 4px 20px rgba(245,158,11,.3);}

/* Point increment selector */
.inc-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.inc-btn{padding:6px 14px;background:#0e0e10;color:#555;border:1px solid #1a1a1e;border-radius:7px;font-family:'Black Ops One',sans-serif;font-size:13px;letter-spacing:1px;transition:all .2s;}
.inc-btn.active{background:rgba(245,158,11,.12);color:var(--gold);border-color:rgba(245,158,11,.3);}

/* ── AUDIENCE ── */
#audience{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);overflow:hidden;}
.aud-glow{position:fixed;bottom:0;left:0;width:100%;height:40%;background:radial-gradient(ellipse at 50% 100%,rgba(245,158,11,.04) 0%,transparent 70%);pointer-events:none;}

/* Leaderboard */
.leaderboard{display:flex;flex-direction:column;gap:clamp(16px,4vw,40px);width:96vw;max-width:1400px;}
.lb-row{display:flex;align-items:center;gap:clamp(20px,4vw,48px);padding:clamp(32px,6vw,80px) clamp(36px,5vw,80px);background:#0a0a0c;border:1px solid #141416;border-radius:clamp(20px,3vw,36px);transition:all .6s cubic-bezier(.34,1.2,.64,1);position:relative;overflow:hidden;}
.lb-rank{font-family:'Black Ops One',sans-serif;font-size:clamp(40px,8vw,100px);min-width:clamp(60px,10vw,130px);text-align:center;opacity:.4;}
.lb-rank.first{opacity:1;color:var(--gold);text-shadow:0 0 40px rgba(245,158,11,.7);}
.lb-color{width:clamp(12px,2vw,28px);height:clamp(60px,10vw,140px);border-radius:clamp(6px,1vw,14px);flex-shrink:0;}
.lb-info{flex:1;}
.lb-name{font-family:'Black Ops One',sans-serif;font-size:clamp(36px,8vw,90px);letter-spacing:5px;}
.lb-score{font-family:'Black Ops One',sans-serif;font-size:clamp(48px,10vw,110px);letter-spacing:8px;min-width:clamp(100px,18vw,280px);text-align:right;}
.lb-bar{position:absolute;bottom:0;left:0;height:8px;border-radius:0 8px 0 0;transition:width .8s cubic-bezier(.34,1.2,.64,1);}
.lb-row.shifting{animation:lbShift .5s cubic-bezier(.34,1.2,.64,1);}
.score-pop{position:absolute;right:clamp(36px,5vw,80px);font-family:'Black Ops One',sans-serif;font-size:clamp(32px,7vw,64px);pointer-events:none;animation:scorePop .8s ease-out forwards;}

/* Waiting */
.waiting{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;height:100%;}
.waiting-code{font-family:'Black Ops One',sans-serif;font-size:clamp(48px,12vw,96px);letter-spacing:16px;color:var(--gold);text-shadow:0 0 30px rgba(245,158,11,.4);}
.waiting-label{font-size:clamp(12px,2.5vw,16px);color:#444;letter-spacing:3px;text-transform:uppercase;}

/* ── ANIMATIONS ── */
@keyframes scorePop{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-60px) scale(1.3);}}
@keyframes lbShift{0%{transform:translateY(20px);opacity:.7;}100%{transform:translateY(0);opacity:1;}}
@keyframes confFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
@keyframes winFlash{0%,100%{opacity:1;}50%{opacity:.6;}}
</style>
</head>

const _lfs = typeof require!=='undefined' ? require('fs') : null;
const _lpath = typeof require!=='undefined' ? require('path') : null;
const _los = typeof require!=='undefined' ? require('os') : null;
function _licenseDir(){
  if(!_lfs||!_lpath||!_los) return null;
  const d = _lpath.join(_los.homedir(),'Library','Application Support','Scoreboard');
  try{ _lfs.mkdirSync(d,{recursive:true}); }catch(e){}
  return d;
}
function _sha256(s){
  try{ const crypto=require('crypto'); return crypto.createHash('sha256').update(s).digest('hex'); }catch(e){ return ''; }
}
function _loadLicense(){
  const dir = _licenseDir(); if(!dir) return {activated:[]};
  try{ return JSON.parse(_lfs.readFileSync(_lpath.join(dir,'license.json'),'utf8')); }catch(e){ return {activated:[]}; }
}
function _saveLicense(lic){
  const dir = _licenseDir(); if(!dir) return;
  try{ _lfs.writeFileSync(_lpath.join(dir,'license.json'),JSON.stringify(lic)); }catch(e){}
}
let LICENSE = _loadLicense();
function isUnlocked(){
  if(!LICENSE.activated||!LICENSE.activated.length) return false;
  return LICENSE.activated.some(h =>
    (LICENSE_HASHES.SB && LICENSE_HASHES.SB.includes(h)) ||
    (LICENSE_HASHES.MST && LICENSE_HASHES.MST.includes(h))
  );
}
function activateLicenseKey(input){
  const k = (input||'').trim().toUpperCase();
  if(!k) return {ok:false, msg:'Enter a key'};
  const h = _sha256(k);
  let matched = false;
  for(const pfx of Object.keys(LICENSE_HASHES)){
    if(LICENSE_HASHES[pfx].includes(h)){ matched = true; break; }
  }
  if(!matched) return {ok:false, msg:'Invalid key — check for typos'};
  if(!LICENSE.activated) LICENSE.activated = [];
  if(LICENSE.activated.includes(h)) return {ok:false, msg:'This key is already activated'};
  LICENSE.activated.push(h);
  LICENSE.date = Date.now();
  _saveLicense(LICENSE);
  return {ok:true};
}
function renderLockScreen(){
  const app = document.getElementById('app');
  if(app) app.innerHTML = '';
  // Remove any operator/audience div left over
  document.querySelectorAll('#operator,#audience,#lobby').forEach(n=>n.remove());
  const wrap = document.createElement('div');
  Object.assign(wrap.style,{position:'fixed',inset:'0',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'radial-gradient(ellipse at 50% 0%,#1a0e00 0%,#030304 60%)',gap:'18px',padding:'40px',zIndex:'9999'});
  const icon = document.createElement('div'); icon.textContent = '🔒'; icon.style.cssText='font-size:60px;opacity:.6;'; wrap.appendChild(icon);
  const title = document.createElement('div'); title.textContent='SCOREBOARD';
  title.style.cssText = "font-family:'Black Ops One',sans-serif;font-size:clamp(28px,6vw,52px);letter-spacing:5px;color:#fbbf24;text-shadow:0 0 40px rgba(245,158,11,.5);";
  wrap.appendChild(title);
  const sub = document.createElement('div'); sub.textContent='Enter your registration key to unlock';
  sub.style.cssText='font-size:13px;color:#666;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;text-align:center;';
  wrap.appendChild(sub);
  const card = document.createElement('div');
  card.style.cssText='background:#0a0a0c;border:1px solid #1a1a1e;border-radius:16px;padding:28px;width:min(420px,95vw);display:flex;flex-direction:column;gap:14px;';
  const inp = document.createElement('input'); inp.type='text';
  inp.placeholder='SB-XXXX-XXXX-XXXX';
  inp.autofocus=true;
  inp.style.cssText='width:100%;padding:14px 16px;background:#060608;border:1px solid #222;border-radius:10px;color:#fbbf24;font-size:16px;font-family:"Barlow Condensed",sans-serif;letter-spacing:3px;text-align:center;text-transform:uppercase;outline:none;';
  card.appendChild(inp);
  const err = document.createElement('div'); err.style.cssText='font-size:13px;color:#ef4444;text-align:center;min-height:18px;letter-spacing:1px;font-family:"Barlow Condensed",sans-serif;font-weight:700;'; card.appendChild(err);
  const btn = document.createElement('button'); btn.textContent='🔓 UNLOCK';
  btn.style.cssText='padding:14px;background:linear-gradient(135deg,#fbbf24,#d97706);color:#000;font-family:"Black Ops One",sans-serif;font-size:14px;letter-spacing:3px;border-radius:10px;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(245,158,11,.3);';
  function tryAct(){
    const r = activateLicenseKey(inp.value);
    if(r.ok){ LICENSE = _loadLicense(); wrap.remove(); render(); }
    else { err.textContent = r.msg; }
  }
  btn.addEventListener('click', tryAct);
  inp.addEventListener('keydown', e => { if(e.key==='Enter') tryAct(); });
  card.appendChild(btn);
  const help = document.createElement('div'); help.innerHTML='Don\'t have a key? Purchase at <span style="color:#888;">livefrenzy.com</span>';
  help.style.cssText='font-size:11px;color:#444;letter-spacing:1px;text-align:center;margin-top:8px;font-family:"Barlow Condensed",sans-serif;';
  card.appendChild(help);
  wrap.appendChild(card);
  document.body.appendChild(wrap);
}

let _prevScores=null;
function handleRemoteState(s){
  if(!s)return;
  const ps=_prevScores;
  _prevScores=s.teams?s.teams.map(t=>t.score):null;
  STATE=s;
  if(ROLE==='audience'&&ps&&s.teams){
    for(let i=0;i<s.teams.length;i++){
      if(ps[i]!==undefined&&s.teams[i].score>ps[i])soundBigAdd();
      else if(ps[i]!==undefined&&s.teams[i].score<ps[i])soundSub();
    }
  }
  render();
}

// ── RENDER ──
function render(){
  if(ROLE==='operator' && !isUnlocked()){ renderLockScreen(); return; }

  const app=document.getElementById('app');app.innerHTML='';
  if(ROLE==='operator')app.appendChild(buildOperator());
  else if(ROLE==='audience')app.appendChild(buildAudience());
  else app.appendChild(buildOperator());
}

// ── LOBBY ──
function buildLobby(){
  const wrap=mk({});wrap.id='lobby';
  const title=mk({});title.className='lobby-title';title.textContent='SCOREBOARD';
  const sub=mk({});sub.className='lobby-sub';sub.textContent='Team Score Tracker';
  wrap.appendChild(title);wrap.appendChild(sub);
  const card=mk({});card.className='lobby-card';
  const cl=mk({});cl.className='lobby-label';cl.textContent='Start as Operator';
  const cb=el('button',{className:'btn-primary',onClick:async()=>{ac();ROOM=makeCode();ROLE='operator';await pushState();subscribeRoom();render();}});cb.textContent='▶ CREATE ROOM';
  card.appendChild(cl);card.appendChild(cb);
  const div=mk({});div.className='lobby-divider';div.textContent='OR';card.appendChild(div);
  const jl=mk({});jl.className='lobby-label';jl.textContent='Join as Audience Screen';
  let joinCode='';
  const ji=el('input',{className:'lobby-input',placeholder:'ENTER ROOM CODE',type:'text',onInput:e=>{joinCode=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4);ji.value=joinCode;},onKeydown:e=>{if(e.key==='Enter')doJoin();}});
  const jb=el('button',{className:'btn-secondary',onClick:doJoin});jb.textContent='JOIN AUDIENCE';
  function doJoin(){if(joinCode.length<4)return;ac();ROOM=joinCode;ROLE='audience';subscribeRoom();render();}
  card.appendChild(jl);card.appendChild(ji);card.appendChild(jb);
  wrap.appendChild(card);return wrap;
}

// ── OPERATOR ──
function buildOperator(){
  const wrap=mk({});wrap.id='operator';

  // Top bar
  const topbar=mk({});topbar.className='op-topbar';
  const left=mk({display:'flex',flexDirection:'column'});
  const titleEl=mk({});titleEl.className='op-title';titleEl.textContent='SCOREBOARD';
  const roomEl=mk({});roomEl.className='op-room';roomEl.textContent='v1.0.0';
  left.appendChild(titleEl);left.appendChild(roomEl);
  const topBtns=mk({});topBtns.className='op-topbtns';
  const gb=el('button',{className:'op-btn',style:{color:'var(--green)',borderColor:'rgba(74,222,128,.3)',fontSize:'14px'},onClick:()=>{if(ipc)ipc.send('toggle-audience',true);}});gb.textContent='🟢';topBtns.appendChild(gb);
  const rb=el('button',{className:'op-btn',style:{color:'var(--red)',borderColor:'rgba(239,68,68,.3)',fontSize:'14px'},onClick:()=>{if(ipc)ipc.send('toggle-audience',false);}});rb.textContent='🔴';topBtns.appendChild(rb);
  topbar.appendChild(left);topbar.appendChild(topBtns);wrap.appendChild(topbar);

  if(STATE.screen==='setup'){
    const scroll=mk({});scroll.className='op-scroll';
    const lab=mk({});lab.className='section-label';lab.textContent='Teams';scroll.appendChild(lab);

    editTeams.forEach((t,i)=>{
      const row=mk({});row.className='setup-team';
      const colorDot=mk({width:'12px',height:'36px',borderRadius:'6px',background:TEAM_COLORS[i%TEAM_COLORS.length],flexShrink:'0'});
      const inp=el('input',{style:{color:TEAM_COLORS[i%TEAM_COLORS.length]},placeholder:`Team ${i+1} name`,type:'text',value:t.name,onInput:e=>{editTeams[i].name=e.target.value.toUpperCase();}});
      const del=el('button',{className:'del-btn',disabled:editTeams.length<=2,onClick:()=>{if(editTeams.length<=2)return;editTeams.splice(i,1);render();}});del.textContent='✕';
      row.appendChild(colorDot);row.appendChild(inp);row.appendChild(del);scroll.appendChild(row);
    });

    if(editTeams.length<4){
      const addBtn=el('button',{className:'add-btn',onClick:()=>{editTeams.push({name:'TEAM '+(editTeams.length+1),score:0,color:TEAM_COLORS[editTeams.length%TEAM_COLORS.length]});render();}});
      addBtn.textContent='+ Add Team';scroll.appendChild(addBtn);
    }

    const sb=el('button',{className:'start-btn',onClick:()=>{
      const teams=editTeams.map((t,i)=>({name:t.name.trim()||'TEAM '+(i+1),score:0,color:TEAM_COLORS[i%TEAM_COLORS.length]}));
      saveTeams(editTeams);
      setState({screen:'game',teams,increment:100,lastChange:null});
    }});
    sb.textContent='▶ START';scroll.appendChild(sb);
    wrap.appendChild(scroll);return wrap;
  }

  // ── GAME SCREEN ──
  const scroll=mk({});scroll.className='op-scroll';

  // Point increment selector
  const incLabel=mk({});incLabel.className='section-label';incLabel.textContent='Point Increment';scroll.appendChild(incLabel);
  const incBar=mk({});incBar.className='inc-bar';
  INCREMENTS.forEach(inc=>{
    const btn=el('button',{className:'inc-btn'+(STATE.increment===inc?' active':''),onClick:()=>setState({increment:inc})});
    btn.textContent='+'+inc;incBar.appendChild(btn);
  });
  scroll.appendChild(incBar);

  // Team cards
  const cards=mk({});cards.className='team-cards';
  STATE.teams.forEach((team,i)=>{
    const card=mk({});card.className='team-card';card.style.borderColor=rgba(team.color,.3);

    const colorBar=mk({});colorBar.className='team-color';colorBar.style.background=team.color;
    const nameEl=mk({});nameEl.className='team-name-display';nameEl.style.color=team.color;nameEl.textContent=team.name;
    const scoreEl=mk({});scoreEl.className='team-score-display';scoreEl.style.color=team.color;scoreEl.textContent=team.score;

    const btns=mk({});btns.className='team-btns';
    const subBtn=el('button',{className:'pts-btn sub',onClick:()=>{
      const newTeams=copy(STATE.teams);newTeams[i].score=Math.max(0,newTeams[i].score-STATE.increment);
      soundSub();setState({teams:newTeams,lastChange:{teamIdx:i,delta:-STATE.increment,ts:Date.now()}});
    }});subBtn.textContent='−';
    const addBtn=el('button',{className:'pts-btn add',onClick:()=>{
      const newTeams=copy(STATE.teams);newTeams[i].score+=STATE.increment;
      soundAdd();setState({teams:newTeams,lastChange:{teamIdx:i,delta:STATE.increment,ts:Date.now()}});
    }});addBtn.textContent='+';
    btns.appendChild(subBtn);btns.appendChild(addBtn);

    card.appendChild(colorBar);card.appendChild(nameEl);card.appendChild(scoreEl);card.appendChild(btns);
    cards.appendChild(card);
  });
  scroll.appendChild(cards);

  // Reset button
  const resetBtn=el('button',{className:'op-btn',style:{marginTop:'16px',padding:'10px 20px'},onClick:()=>{
    const newTeams=STATE.teams.map(t=>({...t,score:0}));
    setState({teams:newTeams,lastChange:null});
  }});resetBtn.textContent='↺ Reset Scores';scroll.appendChild(resetBtn);

  const setupBtn=el('button',{className:'op-btn',style:{marginTop:'8px',padding:'10px 20px'},onClick:()=>setState({screen:'setup'})});
  setupBtn.textContent='⚙ Setup';scroll.appendChild(setupBtn);

  wrap.appendChild(scroll);return wrap;
}

// ── AUDIENCE ──
function buildAudience(){
  const wrap=mk({});wrap.id='audience';
  const glow=mk({});glow.className='aud-glow';wrap.appendChild(glow);

  if(STATE.screen==='setup'||!STATE.teams||!STATE.teams.length){
    const w=mk({});w.className='waiting';
    const label=mk({});label.className='waiting-label';label.textContent='SCOREBOARD';
    const code=mk({});code.className='waiting-code';code.textContent='🏆';code.style.fontSize='clamp(48px,12vw,96px)';
    const sub=mk({});sub.className='waiting-label';sub.textContent='Waiting for game to start...';
    w.appendChild(label);w.appendChild(code);w.appendChild(sub);
    wrap.appendChild(w);return wrap;
  }

  // Title
  const title=mk({fontFamily:'"Black Ops One",sans-serif',fontSize:'clamp(28px,5vw,56px)',letterSpacing:'8px',color:'var(--gold)',textAlign:'center',marginBottom:'clamp(20px,3vw,40px)',textShadow:'0 0 40px rgba(245,158,11,.5)'});
  title.textContent='SCOREBOARD';
  wrap.appendChild(title);

  // Sort teams by score (descending) for leaderboard
  const sorted=[...STATE.teams.map((t,i)=>({...t,origIdx:i}))].sort((a,b)=>b.score-a.score);
  const maxScore=Math.max(...sorted.map(t=>t.score),1);

  const lb=mk({});lb.className='leaderboard';

  sorted.forEach((team,rank)=>{
    const row=mk({});row.className='lb-row';
    row.style.borderLeft=`4px solid ${team.color}`;
    row.style.boxShadow=`inset 0 0 30px ${rgba(team.color,.05)}`;

    // Rank
    const rankEl=mk({});rankEl.className='lb-rank'+(rank===0?' first':'');
    rankEl.textContent=rank===0?'👑':String(rank+1);

    // Color bar
    const colorEl=mk({});colorEl.className='lb-color';colorEl.style.background=team.color;

    // Name
    const infoEl=mk({});infoEl.className='lb-info';
    const nameEl=mk({});nameEl.className='lb-name';nameEl.style.color=team.color;nameEl.textContent=team.name;
    infoEl.appendChild(nameEl);

    // Score
    const scoreEl=mk({});scoreEl.className='lb-score';scoreEl.style.color=team.color;
    scoreEl.style.textShadow=`0 0 20px ${rgba(team.color,.4)}`;
    scoreEl.textContent=team.score;

    // Bottom progress bar
    const bar=mk({});bar.className='lb-bar';bar.style.background=team.color;
    bar.style.width=Math.round((team.score/maxScore)*100)+'%';
    bar.style.boxShadow=`0 0 10px ${rgba(team.color,.5)}`;

    // Score pop animation
    if(STATE.lastChange&&STATE.lastChange.teamIdx===team.origIdx&&Date.now()-STATE.lastChange.ts<1500){
      const pop=mk({});pop.className='score-pop';
      pop.style.color=STATE.lastChange.delta>0?'var(--green)':'var(--red)';
      pop.textContent=(STATE.lastChange.delta>0?'+':'')+STATE.lastChange.delta;
      row.appendChild(pop);
    }

    row.appendChild(rankEl);row.appendChild(colorEl);row.appendChild(infoEl);row.appendChild(scoreEl);row.appendChild(bar);
    lb.appendChild(row);
  });

  wrap.appendChild(lb);
  return wrap;
}

// ── INIT ──
function init(){subscribeRoom();render();}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
</body>
