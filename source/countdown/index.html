<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#f59e0b;--cyan:#22d3ee;--purple:#a855f7;--red:#ef4444;--green:#4ade80;--bg:#030304;--surface:#0a0a0c;--border:#1a1a1e;}
html,body{width:100%;height:100%;background:var(--bg);color:#fff;font-family:'Nunito',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
input{outline:none;font-family:inherit;}

/* ── LOBBY ── */
#lobby{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#1a0000 0%,#030304 60%);z-index:100;}
.lobby-title{font-family:'Black Ops One',sans-serif;font-size:clamp(32px,8vw,72px);letter-spacing:6px;color:var(--red);text-shadow:0 0 40px rgba(239,68,68,.5),0 0 80px rgba(239,68,68,.2);margin-bottom:8px;}
.lobby-sub{font-size:clamp(11px,2.5vw,14px);color:#444;letter-spacing:3px;text-transform:uppercase;margin-bottom:48px;}
.lobby-card{background:#0a0a0c;border:1px solid #1a1a1e;border-radius:20px;padding:32px;width:min(420px,90vw);display:flex;flex-direction:column;gap:16px;}
.lobby-label{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;}
.lobby-input{width:100%;padding:14px 16px;background:#060608;border:1px solid #222;border-radius:10px;color:#fff;font-size:18px;font-family:'Barlow Condensed',sans-serif;letter-spacing:4px;text-transform:uppercase;}
.lobby-input::placeholder{color:#333;letter-spacing:2px;}
.lobby-divider{display:flex;align-items:center;gap:12px;color:#222;font-size:11px;}
.lobby-divider::before,.lobby-divider::after{content:'';flex:1;height:1px;background:#1a1a1e;}
.btn-primary{padding:15px;background:linear-gradient(135deg,var(--red),#dc2626);color:#fff;font-family:'Black Ops One',sans-serif;font-size:16px;letter-spacing:3px;border-radius:10px;box-shadow:0 4px 20px rgba(239,68,68,.3);}
.btn-primary:active{transform:scale(.97);}
.btn-secondary{padding:15px;background:transparent;color:#444;border:1px solid #1a1a1e;font-family:'Black Ops One',sans-serif;font-size:16px;letter-spacing:3px;border-radius:10px;}

/* ── OPERATOR ── */
#operator{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
.op-topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#030304;border-bottom:1px solid #111;flex-shrink:0;min-height:52px;}
.op-title{font-family:'Black Ops One',sans-serif;font-size:15px;letter-spacing:3px;color:var(--red);}
.op-room{font-size:11px;color:#333;letter-spacing:2px;}
.op-topbtns{display:flex;gap:8px;align-items:center;}
.op-btn{padding:6px 12px;background:#0e0e10;color:#555;border:1px solid #111;border-radius:7px;font-size:11px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;font-weight:700;}
.op-scroll{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* Time presets */
.preset-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:24px;}
.preset-btn{width:90px;height:90px;background:#0e0e10;border:2px solid #1a1a1e;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all .2s;}
.preset-btn.active{border-color:var(--red);background:rgba(239,68,68,.08);box-shadow:0 0 20px rgba(239,68,68,.15);}
.preset-btn:active{transform:scale(.95);}
.preset-time{font-family:'Black Ops One',sans-serif;font-size:28px;color:var(--red);letter-spacing:2px;}
.preset-label{font-size:10px;color:#444;letter-spacing:1px;text-transform:uppercase;}

/* Custom time */
.custom-row{display:flex;gap:8px;align-items:center;margin-bottom:24px;}
.custom-input{width:80px;padding:12px;background:#0e0e10;border:1px solid #1a1a1e;border-radius:10px;color:var(--red);font-family:'Black Ops One',sans-serif;font-size:24px;text-align:center;letter-spacing:2px;}
.custom-label{font-size:12px;color:#444;letter-spacing:1px;}

/* Control buttons */
.ctrl-big{padding:20px 50px;border-radius:14px;font-family:'Black Ops One',sans-serif;font-size:22px;letter-spacing:4px;transition:all .15s;}
.ctrl-big:active{transform:scale(.95);}
.ctrl-start{background:linear-gradient(135deg,var(--red),#dc2626);color:#fff;box-shadow:0 6px 30px rgba(239,68,68,.4);}
.ctrl-finish{background:linear-gradient(135deg,var(--green),#16a34a);color:#000;box-shadow:0 6px 30px rgba(74,222,128,.4);}
.ctrl-stop{background:linear-gradient(135deg,#555,#333);color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.ctrl-row{display:flex;gap:12px;margin-top:16px;}

/* Operator timer display */
.op-timer{font-family:'Black Ops One',sans-serif;font-size:72px;letter-spacing:6px;text-align:center;margin-bottom:16px;}

/* ── AUDIENCE ── */
#audience{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);overflow:hidden;}

/* Giant timer */
.aud-timer{font-family:'Black Ops One',sans-serif;font-size:clamp(120px,30vw,300px);letter-spacing:clamp(8px,2vw,20px);transition:color .3s,text-shadow .3s;user-select:none;position:relative;z-index:2;}
.aud-timer.chill{color:var(--cyan);text-shadow:0 0 60px rgba(34,211,238,.4),0 0 120px rgba(34,211,238,.15);}
.aud-timer.warning{color:var(--gold);text-shadow:0 0 60px rgba(245,158,11,.5),0 0 120px rgba(245,158,11,.2);}
.aud-timer.danger{color:var(--red);text-shadow:0 0 80px rgba(239,68,68,.6),0 0 160px rgba(239,68,68,.3);animation:dangerPulse .5s ease-in-out infinite;}
.aud-timer.done{color:var(--red);text-shadow:0 0 100px rgba(239,68,68,.8);font-size:clamp(60px,15vw,160px);animation:none;}
.aud-timer.finished{color:var(--green);text-shadow:0 0 100px rgba(74,222,128,.8);font-size:clamp(60px,15vw,160px);animation:winFlash 1s ease-in-out infinite;}

/* Progress ring */
.ring-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
.ring-svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-90deg);z-index:1;}
.ring-bg{fill:none;stroke:#111;stroke-width:8;}
.ring-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .25s linear,stroke .3s;}

/* Glow pulse background */
.aud-bg-pulse{position:fixed;inset:0;pointer-events:none;z-index:0;transition:opacity .5s;}
.aud-bg-pulse.danger{background:radial-gradient(ellipse at 50% 50%,rgba(239,68,68,.08) 0%,transparent 70%);animation:bgPulse .5s ease-in-out infinite;}

/* Label */
.aud-label{font-family:'Barlow Condensed',sans-serif;font-size:clamp(14px,3vw,28px);color:#333;letter-spacing:4px;text-transform:uppercase;margin-top:clamp(12px,2vw,24px);z-index:2;}

/* Waiting */
.waiting{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;height:100%;}
.waiting-title{font-family:'Black Ops One',sans-serif;font-size:clamp(48px,12vw,96px);color:var(--red);text-shadow:0 0 30px rgba(239,68,68,.4);}
.waiting-label{font-size:clamp(12px,2.5vw,16px);color:#444;letter-spacing:3px;text-transform:uppercase;}

/* ── ANIMATIONS ── */
@keyframes dangerPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
@keyframes bgPulse{0%,100%{opacity:.5;}50%{opacity:1;}}
@keyframes winFlash{0%,100%{opacity:1;}50%{opacity:.6;}}
@keyframes confFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
@keyframes screenFlash{0%{opacity:1;}100%{opacity:0;}}
@keyframes shakeHard{0%,100%{transform:translateX(0);}10%{transform:translateX(-15px);}30%{transform:translateX(12px);}50%{transform:translateX(-10px);}70%{transform:translateX(8px);}90%{transform:translateX(-5px);}}
</style>
</head>

const _los = typeof require!=='undefined' ? require('os') : null;
function _licenseDir(){
  if(!_lfs||!_lpath||!_los) return null;
  const d = _lpath.join(_los.homedir(),'Library','Application Support','Countdown');
  try{ _lfs.mkdirSync(d,{recursive:true}); }catch(e){}
  return d;
}
function _sha256(s){
  try{ const crypto=require('crypto'); return crypto.createHash('sha256').update(s).digest('hex'); }catch(e){ return ''; }
}
function _loadLicense(){
  const dir = _licenseDir(); if(!dir) return {activated:[]};
  try{ return JSON.parse(_lfs.readFileSync(_lpath.join(dir,'license.json'),'utf8')); }catch(e){ return {activated:[]}; }
}
function _saveLicense(lic){
  const dir = _licenseDir(); if(!dir) return;
  try{ _lfs.writeFileSync(_lpath.join(dir,'license.json'),JSON.stringify(lic)); }catch(e){}
}
let LICENSE = _loadLicense();
function isUnlocked(){
  if(!LICENSE.activated||!LICENSE.activated.length) return false;
  return LICENSE.activated.some(h =>
    (LICENSE_HASHES.CD && LICENSE_HASHES.CD.includes(h)) ||
    (LICENSE_HASHES.MST && LICENSE_HASHES.MST.includes(h))
  );
}
function activateLicenseKey(input){
  const k = (input||'').trim().toUpperCase();
  if(!k) return {ok:false, msg:'Enter a key'};
  const h = _sha256(k);
  let matched = false;
  for(const pfx of Object.keys(LICENSE_HASHES)){
    if(LICENSE_HASHES[pfx].includes(h)){ matched = true; break; }
  }
  if(!matched) return {ok:false, msg:'Invalid key — check for typos'};
  if(!LICENSE.activated) LICENSE.activated = [];
  if(LICENSE.activated.includes(h)) return {ok:false, msg:'This key is already activated'};
  LICENSE.activated.push(h);
  LICENSE.date = Date.now();
  _saveLicense(LICENSE);
  return {ok:true};
}

  const o1b=c.createOscillator(),g1b=c.createGain();o1b.connect(g1b);g1b.connect(c.destination);o1b.type='sine';o1b.frequency.setValueAtTime(156,n+.2);o1b.frequency.exponentialRampToValueAtTime(117,n+.65);g1b.gain.setValueAtTime(.15,n+.2);g1b.gain.exponentialRampToValueAtTime(.001,n+.7);o1b.start(n+.2);o1b.stop(n+.75);
  const o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o2.type='sawtooth';o2.frequency.setValueAtTime(233,n+.75);o2.frequency.exponentialRampToValueAtTime(147,n+1.6);g2.gain.setValueAtTime(.25,n+.75);g2.gain.setValueAtTime(.2,n+1.2);g2.gain.exponentialRampToValueAtTime(.001,n+1.7);o2.start(n+.75);o2.stop(n+1.75);
  const o2b=c.createOscillator(),g2b=c.createGain();o2b.connect(g2b);g2b.connect(c.destination);o2b.type='sine';o2b.frequency.setValueAtTime(117,n+.75);o2b.frequency.exponentialRampToValueAtTime(73,n+1.6);g2b.gain.setValueAtTime(.15,n+.75);g2b.gain.exponentialRampToValueAtTime(.001,n+1.7);o2b.start(n+.75);o2b.stop(n+1.75);
  }catch(e){}
}

function soundFinished(){
  try{const c=ac(),n=c.currentTime;
  [[392,0],[523,.12],[659,.24],[784,.4],[880,.52],[1047,.68],[1319,.85]].forEach(([f,t],i)=>{const v=.12+i*.025;tone(c,'square',f,n+t,n+t+.5,v*.6,n+t+.1);tone(c,'sine',f,n+t,n+t+.6,v,n+t+.12);tone(c,'sine',f*2,n+t+.02,n+t+.4,v*.3,n+t+.06);});
  [1319,1568,2093].forEach(f=>{tone(c,'sine',f,n+1.0,n+2.5,.1,n+1.4);tone(c,'triangle',f,n+1.0,n+2.2,.06,n+1.3);});
  // Shimmer
  const buf=c.createBuffer(1,c.sampleRate*1.5,c.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  const ns=c.createBufferSource(),ng=c.createGain(),nf=c.createBiquadFilter();ns.buffer=buf;ns.connect(nf);nf.connect(ng);ng.connect(c.destination);nf.type='highpass';nf.frequency.value=6000;nf.Q.value=2;ng.gain.setValueAtTime(0,n+.8);ng.gain.linearRampToValueAtTime(.08,n+1.0);ng.gain.exponentialRampToValueAtTime(.001,n+2.5);ns.start(n+.8);ns.stop(n+2.6);
  }catch(e){}
}

// ── CONFETTI ──
function spawnConfetti(){
  if(document.querySelector('.conf'))return;
  const colors=['#4ade80','#22d3ee','#fff','#a855f7','#f59e0b','#60a5fa'];
  const l=mk({position:'fixed',top:'0',left:'0',width:'100%',height:'100%',pointerEvents:'none',overflow:'hidden',zIndex:'999'});l.className='conf';
  for(let i=0;i<100;i++){const s=(6+Math.random()*16)+'px';l.appendChild(mk({position:'absolute',left:Math.floor(Math.random()*100)+'%',top:'-25px',width:s,height:s,background:colors[i%colors.length],borderRadius:Math.random()>.5?'50%':'2px',animation:`confFall ${2+Math.random()*3}s ${Math.random()*2}s ease-in forwards`}));}
  document.getElementById('app').appendChild(l);setTimeout(()=>l.remove(),7000);
}

// ── STATE ──
const ipc=(typeof require!=='undefined')?require('electron').ipcRenderer:null;
let ROLE=(window.location.hash||'').replace('#','').trim()||null;
let ROOM='LOCAL';
let STATE={screen:'idle',totalSec:30,timerEnd:null,running:false,result:null}; // result: null | 'finished' | 'expired'
let selectedPreset=30,customSec='';
let dbUnsubscribe=null;

function setState(patch){STATE=Object.assign({},STATE,patch);pushState();render();}

// ── IPC SYNC ──
function pushState(){if(ipc)ipc.send('cd-state',STATE);}
function subscribeRoom(){
  if(!ipc)return;
  ipc.on('cd-state',(event,s)=>{if(s)handleRemoteState(s);});
  ipc.on('cd-request',()=>{if(ROLE==='operator')pushState();});
  if(ROLE==='audience')ipc.send('cd-request');
}

let _prevResult=null,_prevRunning=null;
function handleRemoteState(s){
  if(!s)return;
  const pr=_prevResult,prun=_prevRunning;
  _prevResult=s.result;_prevRunning=s.running;
  STATE=s;
  if(ROLE==='audience'){
    if(s.result==='finished'&&pr!==s.result){soundFinished();setTimeout(spawnConfetti,200);}
    if(s.result==='expired'&&pr!==s.result){soundTimesUp();setTimeout(soundWompWomp,200);}
  }
  render();
}

// ── TIMER TICK ──
let _lastTick=-1,_timerInt=null;
function startTick(){
  if(_timerInt)clearInterval(_timerInt);_lastTick=-1;
  _timerInt=setInterval(()=>{
    if(!STATE.running||!STATE.timerEnd)return;
    const rem=Math.max(0,Math.ceil((STATE.timerEnd-Date.now())/1000));
    if(rem!==_lastTick&&rem>0){soundTick(rem);_lastTick=rem;}
    if(rem<=0&&_lastTick!==0){
      _lastTick=0;
      soundTimesUp();setTimeout(soundWompWomp,200);
      if(ROLE==='operator')setState({running:false,result:'expired'});
      render();return;
    }
    render();
  },200);
}

// ── RENDER ──
function render(){
  if(ROLE==='operator' && !isUnlocked()){ renderLockScreen(); return; }
  const app=document.getElementById('app');app.innerHTML='';
  if(ROLE==='operator')app.appendChild(buildOperator());
  else if(ROLE==='audience')app.appendChild(buildAudience());
  else app.appendChild(buildOperator());
}

// ── LOBBY ──
function buildLobby(){
  const wrap=mk({});wrap.id='lobby';
  wrap.appendChild(Object.assign(mk({}),{className:'lobby-title',textContent:'COUNTDOWN'}));
  wrap.appendChild(Object.assign(mk({}),{className:'lobby-sub',textContent:'Game Timer'}));
  const card=mk({});card.className='lobby-card';
  card.appendChild(Object.assign(mk({}),{className:'lobby-label',textContent:'Start as Operator'}));
  card.appendChild(el('button',{className:'btn-primary',onClick:()=>{ac();ROOM=makeCode();ROLE='operator';pushState();subscribeRoom();render();}}));card.lastChild.textContent='▶ CREATE ROOM';
  card.appendChild(Object.assign(mk({}),{className:'lobby-divider',textContent:'OR'}));
  card.appendChild(Object.assign(mk({}),{className:'lobby-label',textContent:'Join as Audience'}));
  let jc='';const ji=el('input',{className:'lobby-input',placeholder:'ROOM CODE',type:'text',onInput:e=>{jc=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4);ji.value=jc;},onKeydown:e=>{if(e.key==='Enter'&&jc.length===4){ac();ROOM=jc;ROLE='audience';subscribeRoom();render();}}});
  card.appendChild(ji);card.appendChild(el('button',{className:'btn-secondary',onClick:()=>{if(jc.length<4)return;ac();ROOM=jc;ROLE='audience';subscribeRoom();render();}}));card.lastChild.textContent='JOIN AUDIENCE';
  wrap.appendChild(card);return wrap;
}

// ── OPERATOR ──
function buildOperator(){
  const wrap=mk({});wrap.id='operator';
  const topbar=mk({});topbar.className='op-topbar';
  const left=mk({display:'flex',flexDirection:'column'});
  left.appendChild(Object.assign(mk({}),{className:'op-title',textContent:'COUNTDOWN'}));
  left.appendChild(Object.assign(mk({}),{className:'op-room',textContent:'v1.0.0'}));
  const btns=mk({});btns.className='op-topbtns';
  btns.appendChild(el('button',{className:'op-btn',style:{color:'var(--green)',borderColor:'rgba(74,222,128,.3)',fontSize:'14px'},onClick:()=>{if(ipc)ipc.send('toggle-audience',true);}}));btns.lastChild.textContent='🟢';
  btns.appendChild(el('button',{className:'op-btn',style:{color:'var(--red)',borderColor:'rgba(239,68,68,.3)',fontSize:'14px'},onClick:()=>{if(ipc)ipc.send('toggle-audience',false);}}));btns.lastChild.textContent='🔴';
  topbar.appendChild(left);topbar.appendChild(btns);wrap.appendChild(topbar);

  const scroll=mk({});scroll.className='op-scroll';

  if(!STATE.running&&!STATE.result){
    // Idle — show presets
    const pg=mk({});pg.className='preset-grid';
    PRESETS.forEach(p=>{
      const btn=mk({});btn.className='preset-btn'+(selectedPreset===p.sec?' active':'');
      btn.addEventListener('click',()=>{selectedPreset=p.sec;render();});
      const t=mk({});t.className='preset-time';t.textContent=fmtTime(p.sec);
      const l=mk({});l.className='preset-label';l.textContent=p.label;
      btn.appendChild(t);btn.appendChild(l);pg.appendChild(btn);
    });
    scroll.appendChild(pg);

    // Custom
    const cr=mk({});cr.className='custom-row';
    const ci=el('input',{className:'custom-input',placeholder:'##',type:'number',value:customSec,onInput:e=>{customSec=e.target.value;if(parseInt(customSec)>0)selectedPreset=parseInt(customSec);}});
    cr.appendChild(ci);cr.appendChild(Object.assign(mk({}),{className:'custom-label',textContent:'seconds (custom)'}));
    scroll.appendChild(cr);

    // Start
    scroll.appendChild(el('button',{className:'ctrl-big ctrl-start',onClick:()=>{
      ac();const sec=selectedPreset||30;
      setState({screen:'running',totalSec:sec,timerEnd:Date.now()+sec*1000,running:true,result:null});
    }}));scroll.lastChild.textContent='▶ START';
  }else if(STATE.running){
    // Running — show timer + finish/stop buttons
    const rem=Math.max(0,Math.ceil((STATE.timerEnd-Date.now())/1000));
    const te=mk({});te.className='op-timer';te.style.color=rem<=5?'var(--red)':rem<=10?'var(--gold)':'var(--cyan)';
    te.textContent=fmtTime(rem);scroll.appendChild(te);

    const row=mk({});row.className='ctrl-row';
    row.appendChild(el('button',{className:'ctrl-big ctrl-finish',onClick:()=>{soundFinished();setTimeout(spawnConfetti,200);setState({running:false,result:'finished'});}}));row.lastChild.textContent='✅ FINISHED!';
    row.appendChild(el('button',{className:'ctrl-big ctrl-stop',onClick:()=>{setState({running:false,result:null,timerEnd:null});}}));row.lastChild.textContent='⏹ STOP';
    scroll.appendChild(row);
  }else if(STATE.result){
    // Result shown — reset button
    const te=mk({});te.className='op-timer';
    te.style.color=STATE.result==='finished'?'var(--green)':'var(--red)';
    te.textContent=STATE.result==='finished'?'FINISHED!':'TIME\'S UP!';
    scroll.appendChild(te);
    scroll.appendChild(el('button',{className:'ctrl-big ctrl-start',onClick:()=>{setState({screen:'idle',running:false,result:null,timerEnd:null});}}));scroll.lastChild.textContent='↺ RESET';
  }

  wrap.appendChild(scroll);return wrap;
}

// ── AUDIENCE ──
function buildAudience(){
  const wrap=mk({});wrap.id='audience';

  if(!STATE.running&&!STATE.result){
    const w=mk({});w.className='waiting';
    w.appendChild(Object.assign(mk({}),{className:'waiting-title',textContent:'⏱'}));
    w.appendChild(Object.assign(mk({}),{className:'waiting-label',textContent:'Countdown Timer'}));
    wrap.appendChild(w);return wrap;
  }

  const rem=STATE.running?Math.max(0,Math.ceil((STATE.timerEnd-Date.now())/1000)):0;
  const pct=STATE.totalSec>0?rem/STATE.totalSec:0;
  const ringSize=Math.min(window.innerWidth,window.innerHeight)*.85;
  const r=ringSize/2-20;
  const circ=2*Math.PI*r;

  // Background pulse for danger zone
  if(STATE.running&&rem<=5){
    const bgp=mk({});bgp.className='aud-bg-pulse danger';wrap.appendChild(bgp);
  }

  // Screen flash on result
  if(STATE.result==='expired'){
    const flash=mk({position:'fixed',inset:'0',background:'rgba(239,68,68,.15)',pointerEvents:'none',zIndex:'1',animation:'screenFlash 2s ease-out forwards'});
    wrap.appendChild(flash);
    wrap.style.animation='shakeHard .5s ease';
  }

  // Ring
  const ringWrap=mk({});ringWrap.className='ring-wrap';
  ringWrap.style.width=ringSize+'px';ringWrap.style.height=ringSize+'px';

  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','ring-svg');svg.setAttribute('width',ringSize);svg.setAttribute('height',ringSize);
  const bgCirc=document.createElementNS('http://www.w3.org/2000/svg','circle');
  bgCirc.setAttribute('class','ring-bg');bgCirc.setAttribute('cx',ringSize/2);bgCirc.setAttribute('cy',ringSize/2);bgCirc.setAttribute('r',r);
  const fgCirc=document.createElementNS('http://www.w3.org/2000/svg','circle');
  fgCirc.setAttribute('class','ring-fg');fgCirc.setAttribute('cx',ringSize/2);fgCirc.setAttribute('cy',ringSize/2);fgCirc.setAttribute('r',r);
  fgCirc.setAttribute('stroke-dasharray',circ);
  fgCirc.setAttribute('stroke-dashoffset',circ*(1-pct));
  fgCirc.setAttribute('stroke',rem<=5?'#ef4444':rem<=10?'#f59e0b':'#22d3ee');
  svg.appendChild(bgCirc);svg.appendChild(fgCirc);ringWrap.appendChild(svg);

  // Timer text
  const te=mk({});te.className='aud-timer';
  if(STATE.result==='finished'){
    te.className+=' finished';te.textContent='FINISHED!';
  }else if(STATE.result==='expired'){
    te.className+=' done';te.textContent="TIME'S UP!";
  }else{
    te.className+=(rem<=5?' danger':rem<=10?' warning':' chill');
    te.textContent=fmtTime(rem);
  }
  ringWrap.appendChild(te);
  wrap.appendChild(ringWrap);

  // Label
  if(STATE.running){
    const lab=mk({});lab.className='aud-label';
    lab.textContent=rem<=5?'HURRY!':rem<=10?'ALMOST THERE...':'TIME REMAINING';
    wrap.appendChild(lab);
  }

  return wrap;
}

// ── INIT ──
function init(){subscribeRoom();startTick();render();}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
