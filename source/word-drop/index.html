<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Word Drop</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#f59e0b;--cyan:#22d3ee;--purple:#a855f7;--red:#ef4444;--green:#4ade80;
  --bg:#030304;--surface:#0a0a0c;--border:#1a1a1e;
}
html,body{width:100%;height:100%;background:var(--bg);color:#fff;font-family:'Nunito',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
input,textarea{outline:none;font-family:inherit;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}

/* ── LOBBY ───────────────────────────────────────────────────────────────── */
#lobby{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;
  background:radial-gradient(ellipse at 50% 0%,#0a1a2e 0%,#030304 60%);
  z-index:100;
}
.lobby-title{
  font-family:'Black Ops One',sans-serif;font-size:clamp(32px,8vw,72px);
  letter-spacing:6px;color:var(--cyan);
  text-shadow:0 0 40px rgba(34,211,238,.5),0 0 80px rgba(34,211,238,.2);
  margin-bottom:8px;
}
.lobby-sub{font-size:clamp(11px,2.5vw,14px);color:#444;letter-spacing:3px;text-transform:uppercase;margin-bottom:48px;}
.lobby-card{
  background:#0a0a0c;border:1px solid #1a1a1e;border-radius:20px;
  padding:32px;width:min(420px,90vw);display:flex;flex-direction:column;gap:16px;
}
.lobby-label{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;}
.lobby-input{
  width:100%;padding:14px 16px;background:#060608;border:1px solid #222;border-radius:10px;
  color:#fff;font-size:18px;font-family:'Barlow Condensed',sans-serif;letter-spacing:4px;
  text-transform:uppercase;
}
.lobby-input::placeholder{color:#333;letter-spacing:2px;}
.lobby-divider{display:flex;align-items:center;gap:12px;color:#222;font-size:11px;}
.lobby-divider::before,.lobby-divider::after{content:'';flex:1;height:1px;background:#1a1a1e;}
.btn-primary{
  padding:15px;background:linear-gradient(135deg,var(--cyan),#0891b2);
  color:#000;font-family:'Black Ops One',sans-serif;font-size:16px;letter-spacing:3px;
  border-radius:10px;box-shadow:0 4px 20px rgba(34,211,238,.3);
  transition:transform .15s,box-shadow .15s;
}
.btn-primary:active{transform:scale(.97);}
.btn-secondary{
  padding:15px;background:transparent;color:#444;border:1px solid #1a1a1e;
  font-family:'Black Ops One',sans-serif;font-size:16px;letter-spacing:3px;border-radius:10px;
  transition:border-color .15s,color .15s;
}
.btn-secondary:active{border-color:#444;color:#888;}
.room-display{
  text-align:center;padding:20px;background:#060608;border:1px solid #222;border-radius:12px;
}
.room-code-big{
  font-family:'Black Ops One',sans-serif;font-size:48px;letter-spacing:12px;
  color:var(--cyan);text-shadow:0 0 20px rgba(34,211,238,.4);
}
.room-hint{font-size:12px;color:#444;margin-top:8px;letter-spacing:1px;}

/* ── OPERATOR ────────────────────────────────────────────────────────────── */
#operator{
  position:fixed;inset:0;display:flex;flex-direction:column;
  background:var(--bg);overflow:hidden;
}
.op-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:#030304;border-bottom:1px solid #111;flex-shrink:0;
  min-height:52px;
}
.op-title{font-family:'Black Ops One',sans-serif;font-size:15px;letter-spacing:3px;color:var(--cyan);}
.op-room{font-size:11px;color:#333;letter-spacing:2px;}
.op-topbtns{display:flex;gap:8px;align-items:center;}
.op-btn{
  padding:6px 12px;background:#0e0e10;color:#555;border:1px solid #111;
  border-radius:7px;font-size:11px;font-family:'Barlow Condensed',sans-serif;
  letter-spacing:1px;font-weight:700;
}
.op-scroll{flex:1;overflow-y:auto;padding:12px 14px;}

/* Controls */
.ctrl-bar{
  display:flex;gap:5px;padding:8px 14px;background:#040404;
  border-bottom:1px solid #0a0a0a;flex-shrink:0;flex-wrap:wrap;align-items:center;
}
.ctrl-btn{
  padding:7px 13px;background:#0e0e10;color:#555;border:1px solid #111;
  border-radius:7px;font-size:12px;font-family:'Barlow Condensed',sans-serif;
  font-weight:700;letter-spacing:1px;
}
.ctrl-btn.active{background:rgba(34,211,238,.12);color:var(--cyan);border-color:rgba(34,211,238,.2);}
.ctrl-btn.go{
  background:linear-gradient(135deg,var(--green),#16a34a);color:#000;
  font-family:'Black Ops One',sans-serif;font-size:13px;letter-spacing:2px;
  box-shadow:0 4px 14px rgba(74,222,128,.3);
}
.ctrl-btn.reveal{
  background:linear-gradient(135deg,var(--purple),#7e22ce);color:#fff;
  font-family:'Black Ops One',sans-serif;font-size:13px;letter-spacing:2px;
  box-shadow:0 4px 14px rgba(168,85,247,.3);
}
.ctrl-btn.next{color:var(--cyan);border-color:rgba(34,211,238,.15);}
.ctrl-sep{width:1px;height:20px;background:#111;flex-shrink:0;}

/* Word tiles (operator) */
.word-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center;justify-content:center;}
.word-tile-op{
  padding:8px 14px;background:#0e0e10;color:var(--cyan);border:1px solid #1a1a1e;
  border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:16px;
  letter-spacing:2px;font-weight:700;cursor:pointer;transition:all .2s;user-select:none;
}
.word-tile-op.dropped{
  background:#100000;color:#ef4444;border-color:#2a0000;text-decoration:line-through;opacity:.5;
}
.word-tile-op:active{transform:scale(.95);}

/* Verse list */
.verse-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;max-height:200px;overflow-y:auto;}
.verse-row{display:flex;gap:8px;align-items:center;}
.verse-info{
  flex:1;padding:10px 14px;background:#0e0e10;border:1px solid #1a1a1e;border-radius:8px;
}
.verse-text{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:var(--cyan);letter-spacing:1px;}
.verse-ref{font-size:11px;color:#444;margin-top:2px;}
.del-btn{
  width:32px;height:32px;background:#1a0000;color:var(--red);border:1px solid #2a0000;
  border-radius:7px;font-size:14px;flex-shrink:0;
}
.add-row{display:flex;flex-direction:column;gap:8px;}
.add-input{
  width:100%;padding:11px 14px;background:#0e0e10;border:1px solid #1a1a1e;border-radius:8px;
  color:var(--cyan);font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:2px;
}
.add-input::placeholder{color:#2a2a2a;letter-spacing:1px;}
.add-input.ref-input{color:#888;font-size:14px;letter-spacing:1px;}
.add-row-btns{display:flex;gap:8px;}
.add-btn{
  flex:1;padding:11px;background:var(--cyan);color:#000;font-family:'Black Ops One',sans-serif;
  font-size:14px;letter-spacing:2px;border-radius:8px;
}
.start-btn{
  width:100%;margin-top:12px;padding:17px;
  background:linear-gradient(135deg,var(--cyan),#0891b2);color:#000;
  font-family:'Black Ops One',sans-serif;font-size:18px;letter-spacing:4px;
  border-radius:10px;box-shadow:0 4px 20px rgba(34,211,238,.3);
}
.section-label{
  font-size:9px;color:#38bdf8;font-weight:900;text-transform:uppercase;letter-spacing:2px;
  margin-bottom:8px;margin-top:16px;
}

/* Mode selector */
.mode-bar{display:flex;gap:8px;margin-bottom:12px;}
.mode-btn{
  flex:1;padding:14px;background:#0e0e10;color:#555;border:2px solid #1a1a1e;
  border-radius:10px;font-family:'Black Ops One',sans-serif;font-size:14px;
  letter-spacing:2px;text-align:center;transition:all .2s;
}
.mode-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,.06);box-shadow:0 0 20px rgba(34,211,238,.15);}

/* Game settings */
.setting-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.setting-label{font-size:12px;color:#555;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;font-weight:700;min-width:100px;}
.stepper{display:flex;align-items:center;gap:0;}
.stepper-btn{
  width:36px;height:36px;background:#0e0e10;color:var(--cyan);border:1px solid #1a1a1e;
  font-size:18px;font-weight:900;display:flex;align-items:center;justify-content:center;
}
.stepper-btn:first-child{border-radius:8px 0 0 8px;}
.stepper-btn:last-child{border-radius:0 8px 8px 0;}
.stepper-val{
  padding:6px 16px;background:#060608;color:#fff;border-top:1px solid #1a1a1e;border-bottom:1px solid #1a1a1e;
  font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;min-width:50px;text-align:center;
}

/* Theme chips */
.theme-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.theme-chip{
  width:32px;height:32px;border-radius:7px;font-size:16px;
  background:transparent;border:1px solid transparent;transition:all .15s;
}
.theme-chip.active{border-color:var(--cyan);background:rgba(34,211,238,.1);box-shadow:0 0 10px rgba(34,211,238,.25);}

/* ── AUDIENCE ────────────────────────────────────────────────────────────── */
#audience{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:var(--bg);overflow:hidden;
}
.aud-glow{
  position:fixed;bottom:0;left:0;width:100%;height:40%;
  background:radial-gradient(ellipse at 50% 100%,rgba(34,211,238,.04) 0%,transparent 70%);
  pointer-events:none;
}

/* Word tiles (audience) */
.aud-word-grid{display:flex;flex-wrap:wrap;gap:0;align-items:center;justify-content:center;perspective:800px;}
.aud-word-row{display:flex;gap:0;align-items:center;justify-content:center;width:100%;}
.aud-word{
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:8px;font-family:'Black Ops One',sans-serif;
  letter-spacing:2px;user-select:none;transition:all .4s cubic-bezier(.34,1.4,.64,1);
  position:relative;
}
.aud-word.visible{border:none;}
.aud-word.dropped{
  animation:wordDrop .6s ease-in forwards;
}
.aud-word.blank{
  border:2px dashed rgba(255,255,255,.12);
  background:rgba(255,255,255,.02);
}
.aud-word.revealing{
  animation:wordReveal .5s cubic-bezier(.34,1.4,.64,1) forwards;
}

/* Timer */
.timer-display{
  font-family:'Black Ops One',sans-serif;font-size:clamp(36px,8vw,72px);
  letter-spacing:6px;color:var(--cyan);margin-top:20px;
  text-shadow:0 0 20px rgba(34,211,238,.4);
}
.timer-display.warning{color:var(--red);text-shadow:0 0 20px rgba(239,68,68,.4);animation:timerPulse .5s ease-in-out infinite;}
.timer-display.done{color:var(--gold);text-shadow:0 0 30px rgba(245,158,11,.6);animation:none;}

/* Reference */
.verse-reference{
  font-family:'Barlow Condensed',sans-serif;font-size:clamp(14px,3vw,24px);
  color:#444;letter-spacing:3px;margin-top:16px;
}

/* Waiting screen */
.waiting{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;height:100%;
}
.waiting-code{font-family:'Black Ops One',sans-serif;font-size:clamp(48px,12vw,96px);
  letter-spacing:16px;color:var(--cyan);text-shadow:0 0 30px rgba(34,211,238,.4);}
.waiting-label{font-size:clamp(12px,2.5vw,16px);color:#444;letter-spacing:3px;text-transform:uppercase;}

/* ── ANIMATIONS ──────────────────────────────────────────────────────────── */
@keyframes wordDrop{
  0%{opacity:1;transform:translateY(0) rotateX(0);}
  40%{opacity:.6;transform:translateY(20px) rotateX(15deg);}
  100%{opacity:0;transform:translateY(120px) rotateX(45deg);}
}
@keyframes wordReveal{
  0%{opacity:0;transform:translateY(40px) scale(.8);}
  60%{opacity:1;transform:translateY(-5px) scale(1.05);}
  100%{opacity:1;transform:translateY(0) scale(1);}
}
@keyframes timerPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
@keyframes breathe{0%,100%{opacity:.7;}50%{opacity:1;}}
@keyframes confFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
@keyframes winFlash{0%,100%{opacity:1;text-shadow:0 0 20px rgba(34,211,238,.8);}50%{opacity:.6;text-shadow:none;}}

/* Connecting overlay */
.connecting{
  position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;z-index:200;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;color:#444;font-size:14px;
}
.spinner{width:32px;height:32px;border:3px solid #111;border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

function el(tag,props,...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(props||{})){
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='onClick')e.addEventListener('click',v);
    else if(k==='onInput')e.addEventListener('input',v);
    else if(k==='onKeydown')e.addEventListener('keydown',v);
    else if(k==='className')e.className=v;
    else if(k==='disabled')e.disabled=!!v;
    else if(k==='placeholder')e.placeholder=v;
    else if(k==='value'&&(tag==='input'||tag==='textarea'))e.value=v;
    else if(k==='type')e.type=v;
    else if(k==='rows')e.rows=v;
  }
  kids.flat().forEach(k=>{if(k!=null&&k!==false)e.appendChild(typeof k==='string'?document.createTextNode(k):k);});
  return e;
}
function mk(s){const d=document.createElement('div');Object.assign(d.style,s);return d;}

function lhex(h,p){h=h.replace('#','');let r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);r=Math.min(255,r+p);g=Math.min(255,g+p);b=Math.min(255,b+p);return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');}
function dhex(h,p){return lhex(h,-p);}
function rgba(h,a){h=h.replace('#','');return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;}

function subscribeRoom(){

  ipc.on('wd-state',(event,s)=>{

    const prevRevealed=STATE.revealed;

let _ctx=null;
function ac(){if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();if(_ctx.state==='suspended')_ctx.resume();return _ctx;}
function tone(c,type,freq,t0,t1,pk,fd){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type;o.frequency.setValueAtTime(freq,t0);g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(pk,t0+.015);g.gain.setValueAtTime(pk,fd||t0+.015);g.gain.exponentialRampToValueAtTime(.001,t1);o.start(t0);o.stop(t1+.01);}

function soundDrop(){
  try{
    const c=ac(),n=c.currentTime;
    // Dramatic swoosh — layered descending tones + noise burst
    // Layer 1: fast descending whistle
    const o1=c.createOscillator(),g1=c.createGain();
    o1.connect(g1);g1.connect(c.destination);
    o1.type='sine';o1.frequency.setValueAtTime(900,n);o1.frequency.exponentialRampToValueAtTime(80,n+.5);
    g1.gain.setValueAtTime(.3,n);g1.gain.exponentialRampToValueAtTime(.001,n+.55);
    o1.start(n);o1.stop(n+.6);
    // Layer 2: sub-bass thud at the end
    const o2=c.createOscillator(),g2=c.createGain();
    o2.connect(g2);g2.connect(c.destination);
    o2.type='sine';o2.frequency.setValueAtTime(60,n+.15);
    g2.gain.setValueAtTime(0,n);g2.gain.linearRampToValueAtTime(.4,n+.18);g2.gain.exponentialRampToValueAtTime(.001,n+.6);
    o2.start(n+.15);o2.stop(n+.65);
    // Layer 3: breathy noise swoosh
    const buf=c.createBuffer(1,c.sampleRate*.4,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const ns=c.createBufferSource(),ng=c.createGain(),nf=c.createBiquadFilter();
    ns.buffer=buf;ns.connect(nf);nf.connect(ng);ng.connect(c.destination);
    nf.type='bandpass';nf.frequency.setValueAtTime(2000,n);nf.frequency.exponentialRampToValueAtTime(200,n+.35);nf.Q.value=1;
    ng.gain.setValueAtTime(.15,n);ng.gain.exponentialRampToValueAtTime(.001,n+.4);
    ns.start(n);ns.stop(n+.45);
  }catch(e){}
}

function soundReveal(){
  try{
    const c=ac(),n=c.currentTime;
    // Grand fanfare — 6-note ascending chord with harmonics + shimmer
    const notes=[[392,0],[523,.15],[659,.3],[784,.48],[880,.63],[1047,.82]];
    notes.forEach(([f,t],i)=>{
      const vol=.12+i*.03;
      // Main square wave
      tone(c,'square',f,n+t,n+t+.5,vol*.6,n+t+.1);
      // Rich sine layer
      tone(c,'sine',f,n+t,n+t+.6,vol,n+t+.12);
      // Octave harmonic for shimmer
      tone(c,'sine',f*2,n+t+.02,n+t+.45,vol*.3,n+t+.08);
      // Fifth harmonic for richness
      if(i>=2)tone(c,'triangle',f*1.5,n+t+.01,n+t+.4,vol*.15,n+t+.06);
    });
    // Final sustain chord
    [1047,1319,1568].forEach(f=>{
      tone(c,'sine',f,n+1.0,n+2.2,.1,n+1.3);
      tone(c,'triangle',f,n+1.0,n+2.0,.06,n+1.2);
    });
    // Sparkle shimmer noise
    const buf=c.createBuffer(1,c.sampleRate*1.5,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const ns=c.createBufferSource(),ng=c.createGain(),nf=c.createBiquadFilter();
    ns.buffer=buf;ns.connect(nf);nf.connect(ng);ng.connect(c.destination);
    nf.type='highpass';nf.frequency.value=6000;nf.Q.value=2;
    ng.gain.setValueAtTime(0,n+.8);ng.gain.linearRampToValueAtTime(.08,n+1.0);ng.gain.exponentialRampToValueAtTime(.001,n+2.2);
    ns.start(n+.8);ns.stop(n+2.3);
  }catch(e){}
}

function soundTick(remaining){
  try{
    const c=ac(),n=c.currentTime;
    if(remaining<=5){
      // Urgent double-beep, rising pitch as time runs out
      const pitch=600+((5-remaining)*120);
      const o1=c.createOscillator(),g1=c.createGain();
      o1.connect(g1);g1.connect(c.destination);
      o1.type='square';o1.frequency.setValueAtTime(pitch,n);
      g1.gain.setValueAtTime(.22,n);g1.gain.exponentialRampToValueAtTime(.001,n+.08);
      o1.start(n);o1.stop(n+.1);
      // Second beep (higher)
      const o2=c.createOscillator(),g2=c.createGain();
      o2.connect(g2);g2.connect(c.destination);
      o2.type='square';o2.frequency.setValueAtTime(pitch*1.25,n+.1);
      g2.gain.setValueAtTime(.22,n+.1);g2.gain.exponentialRampToValueAtTime(.001,n+.18);
      o2.start(n+.1);o2.stop(n+.2);
    }else if(remaining<=10){
      // Tense tick — louder and higher pitched as time drops
      const vol=.1+((10-remaining)*.025);
      const pitch=500+((10-remaining)*50);
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type='sine';o.frequency.setValueAtTime(pitch,n);
      g.gain.setValueAtTime(vol,n);g.gain.exponentialRampToValueAtTime(.001,n+.1);
      o.start(n);o.stop(n+.12);
      // Add a click layer
      const buf=c.createBuffer(1,c.sampleRate*.02,c.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(.8-i/d.length*.8);
      const ns=c.createBufferSource(),ng=c.createGain();
      ns.buffer=buf;ns.connect(ng);ng.connect(c.destination);
      ng.gain.setValueAtTime(vol*.6,n);
      ns.start(n);ns.stop(n+.03);
    }else{
      // Normal steady clock tick — soft click sound
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type='sine';o.frequency.setValueAtTime(800,n);
      g.gain.setValueAtTime(.06,n);g.gain.exponentialRampToValueAtTime(.001,n+.04);
      o.start(n);o.stop(n+.05);
      // Click noise layer
      const buf=c.createBuffer(1,c.sampleRate*.015,c.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(.5-i/d.length*.5);
      const ns=c.createBufferSource(),ng=c.createGain();
      ns.buffer=buf;ns.connect(ng);ng.connect(c.destination);
      ng.gain.setValueAtTime(.05,n);
      ns.start(n);ns.stop(n+.02);
    }
  }catch(e){}
}

function soundTimesUp(){
  try{
    const c=ac(),n=c.currentTime;
    // Dramatic buzzer — low dissonant chord
    [[150,0],[180,0],[220,.0]].forEach(([f,t])=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type='sawtooth';o.frequency.setValueAtTime(f,n+t);
      g.gain.setValueAtTime(.2,n+t);g.gain.setValueAtTime(.2,n+t+.3);g.gain.exponentialRampToValueAtTime(.001,n+t+.8);
      o.start(n+t);o.stop(n+t+.85);
    });
  }catch(e){}
}

function soundWompWomp(){
  try{
    const c=ac(),n=c.currentTime;
    // Classic "womp womp" — two descending trombone-like tones
    // First womp (higher)
    const o1=c.createOscillator(),g1=c.createGain();
    o1.connect(g1);g1.connect(c.destination);
    o1.type='sawtooth';o1.frequency.setValueAtTime(311,n);o1.frequency.exponentialRampToValueAtTime(233,n+.45);
    g1.gain.setValueAtTime(.25,n);g1.gain.setValueAtTime(.25,n+.3);g1.gain.exponentialRampToValueAtTime(.001,n+.5);
    o1.start(n);o1.stop(n+.55);
    // Sub layer
    const o1b=c.createOscillator(),g1b=c.createGain();
    o1b.connect(g1b);g1b.connect(c.destination);
    o1b.type='sine';o1b.frequency.setValueAtTime(156,n);o1b.frequency.exponentialRampToValueAtTime(117,n+.45);
    g1b.gain.setValueAtTime(.15,n);g1b.gain.exponentialRampToValueAtTime(.001,n+.5);
    o1b.start(n);o1b.stop(n+.55);
    // Second womp (lower, sadder)
    const o2=c.createOscillator(),g2=c.createGain();
    o2.connect(g2);g2.connect(c.destination);
    o2.type='sawtooth';o2.frequency.setValueAtTime(233,n+.55);o2.frequency.exponentialRampToValueAtTime(147,n+1.4);
    g2.gain.setValueAtTime(.25,n+.55);g2.gain.setValueAtTime(.2,n+1.0);g2.gain.exponentialRampToValueAtTime(.001,n+1.5);
    o2.start(n+.55);o2.stop(n+1.55);
    // Sub layer
    const o2b=c.createOscillator(),g2b=c.createGain();
    o2b.connect(g2b);g2b.connect(c.destination);
    o2b.type='sine';o2b.frequency.setValueAtTime(117,n+.55);o2b.frequency.exponentialRampToValueAtTime(73,n+1.4);
    g2b.gain.setValueAtTime(.15,n+.55);g2b.gain.exponentialRampToValueAtTime(.001,n+1.5);
    o2b.start(n+.55);o2b.stop(n+1.55);
  }catch(e){}
}

// ── WORD LAYOUT ENGINE ──────────────────────────────────────────────────────
function computeWordLayout(verse,avW,avH){
  const words=verse.split(/\s+/).filter(w=>w);
  if(!words.length)return{lines:[],fontSize:28,lineHeight:40,gap:10,wordPadX:16,wordPadY:8};

  function tryLayout(fs){
    const charW=fs*.58;
    const padX=Math.max(10,fs*.7);
    const padY=Math.max(6,fs*.35);
    const gap=Math.max(6,fs*.3);
    const lh=fs+padY*2;
    const rowGap=Math.max(8,fs*.4);
    const lines=[];let cur=[];let curW=0;
    words.forEach((w,i)=>{
      const ww=w.length*charW+padX*2;
      const need=cur.length>0?gap+ww:ww;
      if(cur.length>0&&curW+need>avW){lines.push([...cur]);cur=[];curW=0;}
      cur.push(i);curW+=(cur.length>1?gap:0)+ww;
    });
    if(cur.length)lines.push([...cur]);
    let maxW=0;
    lines.forEach(line=>{
      let lw=0;
      line.forEach((idx,j)=>{lw+=(j>0?gap:0)+words[idx].length*charW+padX*2;});
      if(lw>maxW)maxW=lw;
    });
    const totalH=lines.length*lh+(lines.length-1)*rowGap;
    return{lines,fontSize:fs,lineHeight:lh,gap,rowGap,wordPadX:padX,wordPadY:padY,charW,totalW:maxW,totalH,words};
  }

  let fs=56,layout;
  while(fs>=14){layout=tryLayout(fs);if(layout.totalW<=avW&&layout.totalH<=avH)break;fs-=2;}
  return tryLayout(Math.max(fs,14));
}

  const roomEl=mk({});roomEl.className='op-room';
  roomEl.textContent=`${STATE.mode==='game'?'GAME':'PRACTICE'}  ·  ${droppedSet.size} dropped`;
  left.appendChild(titleEl);left.appendChild(roomEl);
  const btns=mk({});btns.className='op-topbtns';
  const greenBtn2=el('button',{className:'op-btn',style:{color:'var(--green)',borderColor:'rgba(74,222,128,.3)',fontSize:'14px'},onClick:()=>{if(ipc)ipc.send('toggle-audience',true);}});
  greenBtn2.textContent='🟢';btns.appendChild(greenBtn2);
  const redBtn2=el('button',{className:'op-btn',style:{color:'var(--red)',borderColor:'rgba(239,68,68,.3)',fontSize:'14px'},onClick:()=>{if(ipc)ipc.send('toggle-audience',false);}});
  redBtn2.textContent='🔴';btns.appendChild(redBtn2);

  setupBtn.textContent='⚙ Setup';btns.appendChild(setupBtn);
  topbar.appendChild(left);topbar.appendChild(btns);
  wrap.appendChild(topbar);

    const refBar=mk({padding:'6px 16px',background:'#050505',borderBottom:'1px solid #0a0a0a',fontSize:'12px',color:'#444',letterSpacing:'1px',fontFamily:'"Barlow Condensed",sans-serif'});
    refBar.textContent='📖 '+STATE.reference;
    wrap.appendChild(refBar);
  }

  // Controls
  const ctrl=mk({});ctrl.className='ctrl-bar';

  if(STATE.mode==='practice'){
    // Practice controls
    const resetBtn=el('button',{className:'ctrl-btn',onClick:()=>setState({dropped:[],revealed:false,timedOut:false})});
    resetBtn.textContent='↺ Reset';ctrl.appendChild(resetBtn);

    const dropRand=el('button',{className:'ctrl-btn next',onClick:()=>{
      const available=words.map((_,i)=>i).filter(i=>!droppedSet.has(i));
      if(!available.length)return;
      const pick=available[Math.floor(Math.random()*available.length)];
      setState({dropped:[...STATE.dropped,pick],revealed:false});
    }});
    dropRand.textContent='🎲 Drop Random';ctrl.appendChild(dropRand);

    ctrl.appendChild(mk({width:'1px',height:'20px',background:'#111',flexShrink:'0'}));

    const revealBtn=el('button',{className:'ctrl-btn reveal',disabled:!droppedSet.size||STATE.revealed,onClick:()=>{
      soundReveal();setTimeout(spawnConfetti,300);
      setState({revealed:true});
    }});
    revealBtn.textContent='✨ Reveal';ctrl.appendChild(revealBtn);

  }else{
    // Game controls
    if(!STATE.timerRunning&&!STATE.revealed){
      const goBtn=el('button',{className:'ctrl-btn go',onClick:()=>{
        const dc=Math.min(STATE.dropCount||3,words.length-1);
        const available=words.map((_,i)=>i);
        // Shuffle and pick
        for(let i=available.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[available[i],available[j]]=[available[j],available[i]];}
        const picks=available.slice(0,dc);
        setState({
          dropped:picks,revealed:false,
          timerRunning:true,timerEnd:Date.now()+(STATE.timerTotal||30)*1000,
        });
      }});
      goBtn.textContent='▶ GO';ctrl.appendChild(goBtn);

      // Drop count adjuster
      ctrl.appendChild(mk({width:'1px',height:'20px',background:'#111',flexShrink:'0'}));
      const dcLabel=mk({fontSize:'11px',color:'#555',fontFamily:'"Barlow Condensed",sans-serif',letterSpacing:'1px'});
      dcLabel.textContent='Drop: '+(STATE.dropCount||3);

      const dcMinus=el('button',{className:'ctrl-btn',onClick:()=>setState({dropCount:Math.max(1,(STATE.dropCount||3)-1)})});
      dcMinus.textContent='−';ctrl.appendChild(dcMinus);
      const dcPlus=el('button',{className:'ctrl-btn',onClick:()=>setState({dropCount:Math.min(words.length-1,(STATE.dropCount||3)+1)})});
      dcPlus.textContent='+';ctrl.appendChild(dcPlus);

    }else if(STATE.timerRunning){
      const revealBtn=el('button',{className:'ctrl-btn reveal',onClick:()=>{

      // Timer display

    }else if(STATE.revealed){

        setState({dropped:[],revealed:false,timedOut:false,timerRunning:false,timerEnd:null});
      }});
      newRound.textContent='🔄 New Round';ctrl.appendChild(newRound);

    // Verse nav
    ctrl.appendChild(mk({width:'1px',height:'20px',background:'#111',flexShrink:'0'}));

    const nextV=el('button',{className:'ctrl-btn next',onClick:()=>{
      const verses=STATE.verses||[];
      if(!verses.length)return;

      const v=verses[ni];
      setState({verse:v.verse,reference:v.ref||'',verseIndex:ni,dropped:[],revealed:false,timedOut:false,timerRunning:false,timerEnd:null});
    }});

  wrap.appendChild(ctrl);

  // Scroll area with word grid

  scroll.appendChild(tip);

  // Word grid
  const grid=mk({});grid.className='word-grid';
  words.forEach((w,i)=>{

    const tile=el('button',{

        if(STATE.mode==='practice'){
          let next;

            next=[...STATE.dropped,i];
          }

// ── AUDIENCE ─────────────────────────────────────────────────────────────────
function buildAudience(){
  const wrap=mk({});wrap.id='audience';
  const glow=mk({});glow.className='aud-glow';wrap.appendChild(glow);

  if(STATE.screen==='setup'||!STATE.verse){
    const w=mk({});w.className='waiting';
    const label=mk({});label.className='waiting-label';label.textContent='WORD DROP';
    const code=mk({});code.className='waiting-code';code.textContent='📖';code.style.fontSize='clamp(48px,12vw,96px)';
    const sub=mk({});sub.className='waiting-label';sub.textContent='Waiting for game to start...';
    w.appendChild(label);w.appendChild(code);w.appendChild(sub);
    wrap.appendChild(w);
    return wrap;
  }

  // Game mode: hide verse until operator hits GO
  if(STATE.mode==='game'&&!STATE.timerRunning&&!STATE.revealed&&(!STATE.dropped||STATE.dropped.length===0)){
    const w=mk({});w.className='waiting';
    const label=mk({});label.className='waiting-label';label.textContent='GET READY!';label.style.color='var(--cyan)';label.style.fontSize='clamp(48px,12vw,96px)';label.style.fontFamily='"Black Ops One",sans-serif';label.style.textShadow='0 0 30px rgba(34,211,238,.5)';
    const sub=mk({});sub.className='waiting-label';sub.textContent=STATE.reference||'Memory Verse Challenge';
    w.appendChild(label);w.appendChild(sub);
    wrap.appendChild(w);
    return wrap;
  }

  const words=(STATE.verse||'').split(/\s+/).filter(w=>w);
  const droppedSet=new Set(STATE.dropped||[]);
  const tm=themeMeta(STATE.themeId);

  // Word layout — leave space for timer (top-right) and reference (bottom-right)
  const hasTimer=STATE.mode==='game'&&(STATE.timerRunning||STATE.revealed);
  const avW=window.innerWidth-100;
  const avH=window.innerHeight-(hasTimer?160:60)-(STATE.reference?70:30);
  const layout=computeWordLayout(STATE.verse,avW,avH);

  // Build frame
  const border=16,R=24;
  const fw=layout.totalW+R*2,fh=layout.totalH+R*2;
  const TW=fw+border*2,TH=fh+border*2;
  const frameWrap=mk({position:'relative',width:TW+'px',height:TH+'px',flexShrink:'0'});

  // Glow
  frameWrap.appendChild(mk({position:'absolute',inset:'-10px',borderRadius:'28px',
    boxShadow:`0 0 70px ${rgba(tm.accent,.2)},0 0 140px ${rgba(tm.accent,.08)}`,
    pointerEvents:'none',zIndex:'0'}));

  // Frame background
  const fr=mk({position:'absolute',top:border+'px',left:border+'px',
    width:fw+'px',height:fh+'px',borderRadius:'18px',
    background:tm.frame,
    boxShadow:'inset 0 4px 0 rgba(255,255,255,.2),inset 0 -4px 0 rgba(0,0,0,.5)',
    zIndex:'4'});
  // Accent stripes
  const stripT=mk({position:'absolute',top:'0',left:'0',right:'0',height:'6px',
    borderRadius:'18px 18px 0 0',background:tm.accent,boxShadow:`0 0 18px ${rgba(tm.accent,.8)}`});
  const stripB=mk({position:'absolute',bottom:'0',left:'0',right:'0',height:'6px',
    borderRadius:'0 0 18px 18px',background:tm.accent,boxShadow:`0 0 18px ${rgba(tm.accent,.8)}`});
  fr.appendChild(stripT);fr.appendChild(stripB);

  // Slot
  const slot=mk({position:'absolute',top:R+'px',left:R+'px',
    width:layout.totalW+'px',height:layout.totalH+'px',borderRadius:'8px',background:'#030305',
    boxShadow:`inset 0 6px 24px rgba(0,0,0,.99),inset 0 0 0 2px ${rgba(tm.accent,.1)}`,
    display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
    gap:layout.rowGap+'px',overflow:'visible',zIndex:'5',padding:'0'});

  // Render word lines
  layout.lines.forEach(lineIdxs=>{
    const row=mk({display:'flex',gap:layout.gap+'px',alignItems:'center',justifyContent:'center'});
    lineIdxs.forEach(idx=>{
      const w=words[idx];
      const isDropped=droppedSet.has(idx);
      const isRevealing=STATE.revealed&&isDropped;
      const ww=w.length*layout.charW+layout.wordPadX*2;

      const tile=mk({
        width:ww+'px',height:layout.lineHeight+'px',
        borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center',
        fontFamily:'"Black Ops One",sans-serif',fontSize:layout.fontSize+'px',
        letterSpacing:'2px',userSelect:'none',flexShrink:'0',perspective:'800px',
      });

      if(isRevealing){
        // Word is being revealed — red if timed out, normal if operator revealed
        const isTimedOut=STATE.timedOut;
        Object.assign(tile.style,{
          background:isTimedOut?'linear-gradient(150deg,#dc2626,#991b1b,#7f1d1d)':tm.tileReveal,
          color:isTimedOut?'#fff':tm.tileText,border:'none',
          boxShadow:isTimedOut
            ?`0 0 ${Math.round(layout.fontSize*.5)}px rgba(239,68,68,.75),0 3px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.15)`
            :`0 0 ${Math.round(layout.fontSize*.5)}px ${tm.tileGlow},0 3px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.25)`,
          animation:'wordReveal .5s cubic-bezier(.34,1.4,.64,1) forwards',
        });
        tile.textContent=w;
      }else if(isDropped){
        // Word is dropped — show blank
        Object.assign(tile.style,{
          border:'2px dashed rgba(255,255,255,.12)',
          background:'rgba(255,255,255,.02)',
          color:'transparent',
          boxShadow:'inset 0 2px 10px rgba(0,0,0,.8)',
        });
        tile.textContent=w; // invisible text for sizing
      }else{
        // Word is visible
        Object.assign(tile.style,{
          background:tm.tileReveal,color:tm.tileText,border:'none',
          boxShadow:`0 0 ${Math.round(layout.fontSize*.5)}px ${tm.tileGlow},0 3px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.25)`,
        });
        tile.textContent=w;
      }
      row.appendChild(tile);
    });
    slot.appendChild(row);
  });

  fr.appendChild(slot);
  frameWrap.appendChild(fr);
  wrap.appendChild(frameWrap);

  // Timer — top right, large, fixed to viewport
  if(STATE.mode==='game'&&(STATE.timerRunning||STATE.revealed)){
    const remaining=STATE.timerRunning?Math.max(0,Math.ceil(((STATE.timerEnd||0)-Date.now())/1000)):0;
    const timerEl=mk({
      position:'fixed',top:'20px',right:'30px',zIndex:'20',
      fontFamily:'"Black Ops One",sans-serif',fontSize:'clamp(48px,10vw,96px)',
      letterSpacing:'6px',textShadow:'0 0 30px rgba(34,211,238,.5)',
      pointerEvents:'none',
    });
    if(STATE.revealed&&STATE.timedOut){
      // Timer ran out — TIME'S UP! stays in red
      timerEl.textContent="TIME'S UP!";
      timerEl.style.color='var(--red)';
      timerEl.style.textShadow='0 0 30px rgba(239,68,68,.6)';
      timerEl.style.fontSize='clamp(28px,6vw,56px)';
    }else if(STATE.revealed){
      // Operator hit reveal — FINISHED! in green
      timerEl.textContent='FINISHED!';
      timerEl.style.color='var(--green)';
      timerEl.style.textShadow='0 0 30px rgba(74,222,128,.6)';
      timerEl.style.animation='winFlash 1s ease-in-out infinite';
      timerEl.style.fontSize='clamp(28px,6vw,56px)';
    }else if(remaining<=0){
      timerEl.textContent="TIME'S UP!";
      timerEl.style.color='var(--red)';
      timerEl.style.textShadow='0 0 30px rgba(239,68,68,.6)';
      timerEl.style.fontSize='clamp(28px,6vw,56px)';
    }else{
      timerEl.textContent=remaining;
      timerEl.style.color=remaining<=5?'var(--red)':remaining<=10?'var(--gold)':'var(--cyan)';
      if(remaining<=5){timerEl.style.animation='timerPulse .5s ease-in-out infinite';timerEl.style.textShadow='0 0 40px rgba(239,68,68,.6)';}
      else if(remaining<=10){timerEl.style.textShadow='0 0 30px rgba(245,158,11,.5)';}
    }
    wrap.appendChild(timerEl);
  }

  // Scripture reference — bottom right, fixed to viewport
  if(STATE.reference){
    const refEl=mk({
      position:'fixed',bottom:'20px',right:'30px',zIndex:'20',
      fontFamily:'"Barlow Condensed",sans-serif',fontSize:'clamp(16px,3vw,28px)',
      letterSpacing:'3px',color:rgba(tm.accent,.7),
      pointerEvents:'none',
    });
    refEl.textContent='— '+STATE.reference;
    wrap.appendChild(refEl);
  }

  return wrap;
}

// ── TIMER TICK ──────────────────────────────────────────────────────────────
let _lastTickSec=-1;
function startTimerTick(){
  if(timerInterval)clearInterval(timerInterval);
  _lastTickSec=-1;
  timerInterval=setInterval(()=>{
    if(!STATE.timerRunning||!STATE.timerEnd)return;
    const remaining=Math.max(0,Math.ceil((STATE.timerEnd-Date.now())/1000));
    // Play tick sounds once per second for entire timer
    if(remaining!==_lastTickSec&&remaining>0){
      soundTick(remaining);
      _lastTickSec=remaining;
    }
    if(remaining<=0&&_lastTickSec!==0){
      _lastTickSec=0;
      // Time's up — buzzer + womp womp, reveal in red (no confetti)
      soundTimesUp();
      if(ROLE==='operator'){
        setTimeout(()=>{soundWompWomp();
          setState({revealed:true,timedOut:true,timerRunning:false});
        },1000);
      }
      render();
      return;
    }
    render();
  },250);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
function init(){
  // Subscribe to IPC for state sync between operator/audience windows
  subscribeRoom();
  render();
  startTimerTick();
}
