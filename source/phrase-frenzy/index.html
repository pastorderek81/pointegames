<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Phrase Frenzy</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&family=Barlow+Condensed:wght@700;900&family=Black+Ops+One&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:'Nunito',sans-serif;overflow:hidden;}
#app{width:100%;height:100%;}

.btn{cursor:pointer;border:none;font-family:'Nunito',sans-serif;font-weight:700;border-radius:7px;transition:transform .1s,filter .1s;}
.btn:hover:not(:disabled){transform:translateY(-2px);filter:brightness(1.2);}
.btn:active:not(:disabled){transform:scale(.95);}
.btn:disabled{opacity:.28;cursor:default;}

.ltr{cursor:pointer;border:none;border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:20px;width:46px;height:46px;transition:transform .1s,filter .1s;}
.ltr:hover:not(:disabled){transform:scale(1.15);filter:brightness(1.3);}
.ltr:active:not(:disabled){transform:scale(.9);}
.ltr:disabled{cursor:default;}

input{outline:none;font-family:'Nunito',sans-serif;}
input:focus{border-color:#555!important;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#0a0a0a;}
::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}

/* ── Shared dark stage background ── */
.stage {
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255,255,255,.015) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(255,255,255,.008) 0%, transparent 50%),
    #040406;
}

@keyframes breathe    { 0%,100%{opacity:.3} 50%{opacity:.85} }
@keyframes winFlash   { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.8) saturate(2)} }
@keyframes confFall   { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
@keyframes modalIn    { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes wrongShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-14px)} 40%{transform:translateX(14px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(8px)} }
@keyframes rotateSlow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes pulse3d    { 0%,100%{box-shadow:var(--frame-shadow)} 50%{box-shadow:var(--frame-shadow-pulse)} }
@keyframes scanH      { 0%{top:-4px} 100%{top:calc(100% + 4px)} }
@keyframes neonBlink  { 0%,94%,96%,100%{opacity:1} 95%{opacity:.35} }
@keyframes marqueeGlow{ 0%,100%{opacity:.6} 50%{opacity:1} }
@keyframes sheen      { 0%{transform:translateX(-200%) skewX(-20deg)} 100%{transform:translateX(300%) skewX(-20deg)} }

@keyframes thruster{0%,100%{opacity:.7;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.25)}}
@keyframes wheelSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes steamPuff{0%{opacity:.8;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(2.5)}}
@keyframes bulbPulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes sheen{0%{transform:translateX(-200%) skewX(-20deg)}100%{transform:translateX(300%) skewX(-20deg)}}
@keyframes portalSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>

const _lfs = typeof require!=='undefined' ? require('fs') : null;
const _lpath = typeof require!=='undefined' ? require('path') : null;
const _los = typeof require!=='undefined' ? require('os') : null;
function _licenseDir(){
  if(!_lfs||!_lpath||!_los) return null;
  const d = _lpath.join(_los.homedir(),'Library','Application Support','Phrase Frenzy');
  try{ _lfs.mkdirSync(d,{recursive:true}); }catch(e){}
  return d;
}
function _sha256(s){
  try{ const crypto=require('crypto'); return crypto.createHash('sha256').update(s).digest('hex'); }catch(e){ return ''; }
}
function _loadLicense(){
  const dir = _licenseDir(); if(!dir) return {activated:[]};
  try{ return JSON.parse(_lfs.readFileSync(_lpath.join(dir,'license.json'),'utf8')); }catch(e){ return {activated:[]}; }
}
function _saveLicense(lic){
  const dir = _licenseDir(); if(!dir) return;
  try{ _lfs.writeFileSync(_lpath.join(dir,'license.json'),JSON.stringify(lic)); }catch(e){}
}
let LICENSE = _loadLicense();
function isUnlocked(){
  if(!LICENSE.activated||!LICENSE.activated.length) return false;
  return LICENSE.activated.some(h =>
    (LICENSE_HASHES.PF && LICENSE_HASHES.PF.includes(h)) ||
    (LICENSE_HASHES.MST && LICENSE_HASHES.MST.includes(h))
  );
}
function activateLicenseKey(input){
  const k = (input||'').trim().toUpperCase();
  if(!k) return {ok:false, msg:'Enter a key'};
  const h = _sha256(k);
  let matched = false;
  for(const pfx of Object.keys(LICENSE_HASHES)){
    if(LICENSE_HASHES[pfx].includes(h)){ matched = true; break; }
  }
  if(!matched) return {ok:false, msg:'Invalid key — check for typos'};
  if(!LICENSE.activated) LICENSE.activated = [];
  if(LICENSE.activated.includes(h)) return {ok:false, msg:'This key is already activated'};
  LICENSE.activated.push(h);
  LICENSE.date = Date.now();
  _saveLicense(LICENSE);
  return {ok:true};
}

// ── Simple theme factory ─────────────────────────────────────────────────────
function makeSimpleTheme(emoji,label,accent,frame,tile){
  function lhex(h,p){h=h.replace('#','');var r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);r=Math.min(255,r+p);g=Math.min(255,g+p);b=Math.min(255,b+p);return '#'+[r,g,b].map(function(x){return x.toString(16).padStart(2,'0')}).join('');}
  function dhex(h,p){return lhex(h,-p);}
  function rgba(h,a){h=h.replace('#','');return 'rgba('+parseInt(h.slice(0,2),16)+','+parseInt(h.slice(2,4),16)+','+parseInt(h.slice(4,6),16)+','+a+')';}
  var lum=parseInt(tile.replace('#','').slice(0,2),16)*0.299+parseInt(tile.replace('#','').slice(2,4),16)*0.587+parseInt(tile.replace('#','').slice(4,6),16)*0.114;
  return{
    emoji:emoji,label:label,accent:accent,
    tileReveal:'linear-gradient(150deg,'+lhex(tile,60)+','+tile+','+dhex(tile,40)+')',
    tileText:lum>140?'#000':'#fff',tileGlow:rgba(accent,0.75),
    usedHit:accent,usedMiss:'#ef4444',
    confetti:[accent,lhex(accent,60),'#fff',tile,lhex(tile,80),dhex(accent,30)],
    deco:{top:20,bottom:20,left:20,right:20,ring:24},
    make:function(bW,bH,err){
      var R=24,fw=bW+R*2,fh=bH+R*2,border=16,TW=fw+border*2,TH=fh+border*2;
      var wrap=mk({position:'relative',width:TW+'px',height:TH+'px',flexShrink:'0'});
      wrap.appendChild(mk({position:'absolute',inset:'-10px',borderRadius:'28px',boxShadow:'0 0 70px '+rgba(accent,0.22)+', 0 0 140px '+rgba(accent,0.08),pointerEvents:'none',zIndex:'0'}));
      var fr=mk({position:'absolute',top:border+'px',left:border+'px',width:fw+'px',height:fh+'px',borderRadius:'18px',background:err?'#3f0a0a':frame,boxShadow:'inset 0 4px 0 rgba(255,255,255,.25),inset 0 -4px 0 rgba(0,0,0,.5)',zIndex:'4',animation:err?'wrongShake .4s ease':'none'});
      fr.appendChild(mk({position:'absolute',top:'0',left:'0',right:'0',height:'6px',borderRadius:'18px 18px 0 0',background:accent,boxShadow:'0 0 18px '+rgba(accent,0.8)}));
      fr.appendChild(mk({position:'absolute',bottom:'0',left:'0',right:'0',height:'6px',borderRadius:'0 0 18px 18px',background:accent,boxShadow:'0 0 18px '+rgba(accent,0.8)}));
      var slot=mk({position:'absolute',top:R+'px',left:R+'px',width:bW+'px',height:bH+'px',borderRadius:'8px',background:'#030305',boxShadow:'inset 0 6px 24px rgba(0,0,0,.99),inset 0 0 0 2px '+rgba(accent,0.12),display:'flex',alignItems:'center',justifyContent:'center',overflow:'visible',zIndex:'5'});
      fr.appendChild(slot);wrap.appendChild(fr);
      return{wrap:wrap,slot:slot};
    }
  };
}

// ─── TILE BOARD ───────────────────────────────────────────────────────────────
function buildBoard(phrase,guessed,sz,theme,layout){
  var gs=new Set(guessed);
  var fs=Math.floor(sz*.55)+'px';
  var gap=layout?layout.g:Math.max(3,Math.floor(sz*.09));
  var wg=layout?layout.wg:Math.max(6,Math.floor(sz*.45));
  var rg=layout?layout.rg+'px':Math.max(5,Math.floor(sz*.13))+'px';
  var rad=Math.max(4,Math.floor(sz*.1))+'px';
  var bw=Math.max(2,Math.floor(sz/26));
  var th=Math.round(sz*1.16)+'px';
  var lines=layout?layout.lines:phrase.toUpperCase().split(' ').map(function(w){return[w];});

  var board=el('div',{style:{display:'flex',flexDirection:'column',gap:rg,alignItems:'center'}});

  lines.forEach(function(lineWords){
    var row=el('div',{style:{display:'flex',gap:gap+'px',alignItems:'center'}});
    lineWords.forEach(function(word,wi){
      // spacer between words on same line
      if(wi>0){
        var sp=mk({width:Math.round(wg*.5)+'px',height:th,flexShrink:'0'});
        row.appendChild(sp);
      }
      word.split('').forEach(function(ch){
        var rev=gs.has(ch);
        row.appendChild(el('div',{style:{
          width:sz+'px',height:th,flexShrink:'0',
          background:rev?theme.tileReveal:'rgba(255,255,255,.05)',
          border:bw+'px solid '+(rev?'transparent':'rgba(255,255,255,.08)'),
          borderRadius:rad,display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:fs,fontFamily:'"Black Ops One",sans-serif',
          color:rev?theme.tileText:'transparent',
          boxShadow:rev?'0 0 '+Math.round(sz*.28)+'px '+theme.tileGlow+',0 3px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.25)':'inset 0 2px 10px rgba(0,0,0,.8)',
          transition:'all .38s cubic-bezier(.34,1.4,.64,1)',
          transform:rev?'scale(1.05) translateY(-2px)':'scale(1)',
          userSelect:'none',letterSpacing:'1px',
        }},ch));
      });
    });
    board.appendChild(row);
  });
  return board;
}

function el(tag,props,...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(props||{})){
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='onClick')e.addEventListener('click',v);
    else if(k==='onInput')e.addEventListener('input',v);
    else if(k==='onKeydown')e.addEventListener('keydown',v);
    else if(k==='className')e.className=v;
    else if(k==='disabled')e.disabled=!!v;
    else if(k==='placeholder')e.placeholder=v;
    else if(k==='value'&&tag==='input')e.value=v;
    else if(k==='autofocus'&&v)setTimeout(()=>e.focus(),60);
  }
  kids.flat().forEach(k=>{if(k!=null&&k!==false)e.appendChild(typeof k==='string'?document.createTextNode(k):k);});
  return e;
}
const D=(s,...k)=>el('div',{style:s},...k);

// Saves/loads custom themes via Electron userData OR localStorage fallback
var CUSTOM_THEMES_KEY = 'pf_custom_themes';

function loadCustomThemes() {
  try {
    if(typeof require !== 'undefined') {
      var fs = require('fs'), path = require('path');
      var app = require('electron').remote ? require('electron').remote.app : null;
      if(!app) { var {app} = require('@electron/remote') || {}; }
      // Try to get userData path
      var base = (app && app.getPath) ? app.getPath('userData') : null;
      if(base) {
        var fp = path.join(base, 'custom-themes.json');
        if(fs.existsSync(fp)) return JSON.parse(fs.readFileSync(fp,'utf8'));
      }
    }
  } catch(e) {}
  // Fallback: localStorage
  try { return JSON.parse(localStorage.getItem(CUSTOM_THEMES_KEY) || '[]'); } catch(e) { return []; }
}

function saveCustomThemes(themes) {
  try {
    if(typeof require !== 'undefined') {
      var fs = require('fs'), path = require('path');
      try {
        var {app} = require('electron');
        // In renderer with nodeIntegration, use process to find userData
      } catch(e2) {}
      // Use homedir fallback
      var os = require('os');
      var dir = path.join(os.homedir(), 'Library', 'Application Support', 'Phrase Frenzy');
      if(!fs.existsSync(dir)) fs.mkdirSync(dir, {recursive:true});
      fs.writeFileSync(path.join(dir, 'custom-themes.json'), JSON.stringify(themes, null, 2));
      return;
    }
  } catch(e) {}
  try { localStorage.setItem(CUSTOM_THEMES_KEY, JSON.stringify(themes)); } catch(e) {}
}

// Color utility helpers
function hexToRgba(hex, a) {
  hex = hex.replace('#','');
  if(hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r=parseInt(hex.substr(0,2),16), g=parseInt(hex.substr(2,2),16), b=parseInt(hex.substr(4,2),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function lighten(hex) {
  hex=hex.replace('#','');
  if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r=Math.min(255,parseInt(hex.substr(0,2),16)+60),
      g=Math.min(255,parseInt(hex.substr(2,2),16)+60),
      b=Math.min(255,parseInt(hex.substr(4,2),16)+60);
  return '#'+[r,g,b].map(function(x){return x.toString(16).padStart(2,'0')}).join('');
}
function darken(hex) {
  hex=hex.replace('#','');
  if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r=Math.max(0,parseInt(hex.substr(0,2),16)-50),
      g=Math.max(0,parseInt(hex.substr(2,2),16)-50),
      b=Math.max(0,parseInt(hex.substr(4,2),16)-50);
  return '#'+[r,g,b].map(function(x){return x.toString(16).padStart(2,'0')}).join('');
}
function isDark(hex) {
  hex=hex.replace('#','');
  if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r=parseInt(hex.substr(0,2),16), g=parseInt(hex.substr(2,2),16), b=parseInt(hex.substr(4,2),16);
  return (r*299+g*587+b*114)/1000 < 128;
}

function buildGame(){
  const{phrases,index,guessed,hint,won,themeId}=STATE;
  const gs=new Set(guessed),cur=phrases[index]||phrases[0];
  const ph=(cur.phrase||'').toUpperCase();
  const uniq=new Set(ph.replace(/[^A-Z]/g,'').split(''));
  const wrongs=guessed.filter(l=>!ph.includes(l)).length;

  const wrap=D({height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden',background:'#040406'});

  // Top bar
  wrap.appendChild(D({display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 14px',background:'#030304',borderBottom:'1px solid #111',flexShrink:'0'},
    D({display:'flex',alignItems:'center',gap:'8px'},
      D({fontFamily:'"Black Ops One",sans-serif',fontSize:'15px',letterSpacing:'3px',color:'#f59e0b'},'PHRASE FRENZY'),
      updateInfo?el('button',{className:'btn',style:{padding:'3px 8px',background:'#f59e0b22',color:'#f59e0b',border:'1px solid #f59e0b44',fontSize:'10px',letterSpacing:'1px',animation:'breathe 2s ease-in-out infinite'},onClick:function(){showUpdateDialog();}},'⬆ UPDATE'):null
    ),
    D({display:'flex',gap:'7px',alignItems:'center'},
      D({color:'#333',fontSize:'11px'},`${index+1}/${phrases.length} · ${wrongs} wrong`),
      B({padding:'5px 10px',background:'#0e0e10',color:'#444',border:'1px solid #111',fontSize:'11px'},()=>setState({screen:'setup',guessed:[],won:false}),'⚙ Setup'),
      el('button',{className:'btn',title:'Open Audience Screen',
        style:{width:'28px',height:'28px',borderRadius:'50%',border:'2.5px solid #16a34a',
          background:'radial-gradient(circle at 38% 35%,#4ade80,#16a34a)',
          boxShadow:'0 0 10px #4ade8066',cursor:'pointer',padding:'0',flexShrink:'0'},
        onClick:function(){try{ipc.send('toggle-audience',true);}catch(e){}}}),
      el('button',{className:'btn',title:'Close Audience Screen',
        style:{width:'28px',height:'28px',borderRadius:'50%',border:'2.5px solid #7f1d1d',
          background:'radial-gradient(circle at 38% 35%,#f87171,#991b1b)',
          boxShadow:'0 0 10px #f8717166',cursor:'pointer',padding:'0',flexShrink:'0'},
        onClick:function(){try{ipc.send('toggle-audience',false);}catch(e){}}}))));
  // Answer preview
  const ap=D({padding:'6px 14px',background:'#050505',borderBottom:'1px solid #0a0a0a',flexShrink:'0'});
  ap.appendChild(D({fontSize:'9px',color:'#1a1a1a',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'2px'},'Answer — your eyes only'));
  const ar=D({fontFamily:'"Barlow Condensed",sans-serif',fontSize:'17px',letterSpacing:'3px',wordBreak:'break-all',lineHeight:'1.3'});
  for(const ch of ph)ar.appendChild(S({color:ch===' '?'transparent':gs.has(ch)?'#f59e0b':'#222'},ch===' '?'·':ch));
  ap.appendChild(ar);
  if(cur.hint)ap.appendChild(D({fontSize:'9px',color:'#2a2a2a',marginTop:'2px'},'Category: '+cur.hint));
  wrap.appendChild(ap);

  // Controls row
  const ctrl1=D({display:'flex',gap:'5px',padding:'6px 14px',background:'#040404',borderBottom:'1px solid #0a0a0a',flexShrink:'0',alignItems:'center',flexWrap:'wrap'});

  // Hint
  ctrl1.appendChild(B({padding:'5px 11px',background:hint?'rgba(56,189,248,.12)':'#0a0a0a',color:hint?'#38bdf8':'#333',border:`1px solid ${hint?'#38bdf822':'#111'}`,fontSize:'11px'},()=>setState({hint:!hint}),hint?'💡 Hide Hint':'💡 Show Hint'));

  // Divider
  ctrl1.appendChild(D({width:'1px',height:'18px',background:'#111',flexShrink:'0'}));

  // Theme label
  ctrl1.appendChild(D({fontSize:'9px',color:'#222',textTransform:'uppercase',letterSpacing:'1px',flexShrink:'0'},'Frame:'));

  // Theme emoji buttons
  THEME_ORDER.forEach(tid=>{
    const t=THEMES[tid],active=themeId===tid;
    ctrl1.appendChild(el('button',{className:'btn',style:{
      padding:'2px 5px',fontSize:'15px',minWidth:'28px',height:'24px',
      background:active?`${t.accent}18`:'transparent',
      border:`1px solid ${active?t.accent+'44':'transparent'}`,
      borderRadius:'5px',boxShadow:active?`0 0 8px ${(t.tileGlow||'rgba(245,158,11,.3)').replace('.7','.4').replace('.75','.4').replace('.8','.4')}`:'none',
    },onClick:()=>setState({themeId:tid}),title:t.label},t.emoji));
  });
  wrap.appendChild(ctrl1);

  // Alphabet
  const scroll=D({flex:'1',overflowY:'auto',padding:'10px 14px',scrollbarWidth:'thin',scrollbarColor:'#222 transparent'});
  scroll.appendChild(D({fontSize:'9px',color:'#1a1a1a',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'6px'},'Tap to reveal  ·  🏆 Solve when player knows the full phrase'));

  const grid=D({display:'flex',flexWrap:'wrap',gap:'4px',marginBottom:'10px'});
  for(const letter of ALPHA){
    const correct=gs.has(letter)&&ph.includes(letter);

    const used   =gs.has(letter);
    const lb=el('button',{className:'ltr',disabled:used||won,style:{
      background:correct?'linear-gradient(145deg,#f59e0b,#d97706)':wrong?'#100000':'#0e0e10',
      color:correct?'#000':wrong?'#ef4444':used?'#111':'#666',

      boxShadow:correct?'0 0 10px rgba(245,158,11,.4)':'none',

      if(used||won)return;
      const inP=ph.includes(letter),next=[...guessed,letter],done=[...uniq].every(l=>next.includes(l));
      if(inP)soundCorrect();else soundWrong();
      setState({guessed:next,won:done,solveWrong:false});
      if(done){soundSolve();setTimeout(spawnConfetti,100);}
    }},letter);
    grid.appendChild(lb);
  }
  scroll.appendChild(grid);

  const ctrls=D({display:'flex',gap:'6px',flexWrap:'wrap',alignItems:'center'});
  ctrls.appendChild(B({padding:'8px 13px',background:'#0e0e10',color:'#444',border:'1px solid #111',fontSize:'12px'},()=>setState({index:(index-1+phrases.length)%phrases.length,guessed:[],won:false,hint:false,solveWrong:false}),'← Prev'));
  ctrls.appendChild(B({padding:'8px 18px',background:won?'#080808':'linear-gradient(135deg,#a855f7,#7e22ce)',color:won?'#222':'#fff',fontSize:'13px',fontWeight:'900',boxShadow:won?'none':'0 4px 14px rgba(168,85,247,.35)'},()=>{if(won)return;soundSolve();setTimeout(spawnConfetti,100);setState({guessed:[...ALPHA],won:true,solveWrong:false});},won?'✅ Solved':'🏆 Solve',won));
  ctrls.appendChild(B({padding:'8px 13px',background:'#0e0e10',color:'#444',border:'1px solid #111',fontSize:'12px'},()=>setState({guessed:[...ALPHA],won:true,solveWrong:false}),'Reveal All'));
  ctrls.appendChild(B({padding:'8px 18px',background:'#0e0e10',color:'#38bdf8',border:'1px solid #38bdf822',fontSize:'12px',fontWeight:'900'},()=>setState({index:(index+1)%phrases.length,guessed:[],won:false,hint:false,solveWrong:false}),'Next →'));

  scroll.appendChild(ctrls);
  wrap.appendChild(scroll);
  return wrap;
}
function doSolve(){
  const cur=STATE.phrases[STATE.index]||STATE.phrases[0];
  const ph=(cur.phrase||'').toUpperCase();
  const norm=s=>s.toUpperCase().replace(/[^A-Z]/g,'');
  if(norm(solveInput)===norm(ph)){showSolveModal=false;soundSolve();setTimeout(spawnConfetti,100);setState({guessed:[...ALPHA],won:true,solveWrong:false});}
  else{soundWrong();showSolveModal=false;setState({solveWrong:true});setTimeout(()=>{STATE.solveWrong=false;send(STATE);render();},1600);}
}

// ─── UPDATE CHECK ────────────────────────────────────────────────────────────
async function checkForUpdates(silent) {
  try {
    var r = await fetch(UPDATE_CHECK_URL + '?t=' + Date.now(), {cache:'no-store'});
    if (!r.ok) return;
    var data = await r.json();
    if (data.version && data.version !== APP_VERSION) {
      updateInfo = data;
      if (!silent) showUpdateDialog();
      render(); // refresh header badge
    } else if (!silent) {
      alert('✅ You\'re up to date!\n\nPhrase Frenzy v' + APP_VERSION);
    }
  } catch(e) {
    if (!silent) alert('Could not check for updates.\nMake sure you\'re connected to the internet.');
  }
}

function showUpdateDialog() {
  if (!updateInfo) return;
  var msg = '🎉 Phrase Frenzy ' + updateInfo.version + ' is available!\n\n';
  if (updateInfo.notes) msg += updateInfo.notes + '\n\n';
  msg += 'Download the new version?';
  if (confirm(msg)) {
    try { require('electron').shell.openExternal(updateInfo.downloadUrl); }
    catch(e) { window.open && window.open(updateInfo.downloadUrl); }
  }
}

// ─── REMOTE THEMES ───────────────────────────────────────────────────────────
async function fetchRemoteThemes(showFeedback) {
  try {
    var r = await fetch(REMOTE_THEMES_URL + '?t=' + Date.now(), {cache:'no-store'});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var data = await r.json();
    var added = 0;
    (data.themes || []).forEach(function(ct) {
      if (!ct.id || !ct.name) return;
      if (THEMES['remote_' + ct.id]) return; // already loaded
      ct.id = 'remote_' + ct.id;
      THEMES[ct.id] = makeCustomTheme(ct);
      if (THEME_ORDER.indexOf(ct.id) === -1) THEME_ORDER.push(ct.id);
      added++;
    });
    remoteThemesLoaded = true;
    if (showFeedback) {
      alert(added > 0
        ? '✅ Loaded ' + added + ' new theme' + (added===1?'':'s') + '!'
        : 'No new themes — you already have everything!');
    }
    render();
  } catch(e) {
    if (showFeedback) alert('Could not fetch themes. Check your internet connection.');
  }
}

setTimeout(function(){ checkForUpdates(true); }, 2000);
