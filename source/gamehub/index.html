<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Game Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#f59e0b;--cyan:#22d3ee;--purple:#a855f7;--red:#ef4444;--green:#4ade80;--bg:#030304;--surface:#0a0a0c;--border:#1a1a1e;--teamX:#22d3ee;--teamO:#f59e0b;}
html,body{width:100%;height:100%;background:var(--bg);color:#fff;font-family:'Nunito',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
input,textarea{outline:none;font-family:inherit;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}

/* ── TAB BAR ── */
.hub-tabs{display:flex;align-items:center;background:#050506;border-bottom:1px solid #111;padding:0;flex-shrink:0;}
.hub-tab{padding:12px 20px;font-family:'Black Ops One',sans-serif;font-size:13px;letter-spacing:2px;color:#333;background:transparent;border:none;border-bottom:3px solid transparent;transition:all .2s;cursor:pointer;}
.hub-tab:hover{color:#555;}
.hub-tab.active-pf{color:var(--gold);border-bottom-color:var(--gold);}
.hub-tab.active-wd{color:var(--cyan);border-bottom-color:var(--cyan);}
.hub-tab.active-ttt{color:var(--purple);border-bottom-color:var(--purple);}
.hub-right{margin-left:auto;display:flex;gap:6px;padding:0 12px;align-items:center;}
.hub-btn{padding:4px 10px;background:#0e0e10;border:1px solid #111;border-radius:6px;font-size:13px;cursor:pointer;}

/* ── SHARED OPERATOR ── */
#operator{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
.op-scroll{flex:1;overflow-y:auto;padding:12px 14px;}
.section-label{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;margin-top:16px;}
.ctrl-bar{display:flex;gap:5px;padding:8px 14px;background:#040404;border-bottom:1px solid #0a0a0a;flex-shrink:0;flex-wrap:wrap;align-items:center;}
.ctrl-btn{padding:7px 13px;background:#0e0e10;color:#555;border:1px solid #111;border-radius:7px;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;}

/* ── PHRASE FRENZY STYLES ── */
.pf-label{color:var(--gold);}
.alpha-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.ltr-btn{width:44px;height:44px;background:#0e0e10;color:#666;border:1px solid #111;border-radius:8px;font-family:'Black Ops One',sans-serif;font-size:16px;transition:all .15s;flex-shrink:0;}
.ltr-btn.correct{background:linear-gradient(145deg,#f59e0b,#d97706);color:#000;border-color:transparent;box-shadow:0 0 12px rgba(245,158,11,.4);}
.ltr-btn.wrong{background:#100000;color:#ef4444;border-color:#220000;opacity:.5;}
.ltr-btn:disabled{opacity:.3;}
.phrase-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;max-height:200px;overflow-y:auto;}
.phrase-row{display:flex;gap:8px;align-items:center;}
.phrase-info{flex:1;padding:10px 14px;background:#0e0e10;border:1px solid #1a1a1e;border-radius:8px;}
.phrase-text{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:var(--gold);letter-spacing:2px;}
.phrase-hint{font-size:11px;color:#444;margin-top:2px;}

/* ── WORD DROP STYLES ── */
.wd-label{color:var(--cyan);}
.word-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center;justify-content:center;}
.word-tile-op{padding:8px 14px;background:#0e0e10;color:var(--cyan);border:1px solid #1a1a1e;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:2px;font-weight:700;cursor:pointer;transition:all .2s;user-select:none;}
.word-tile-op.dropped{background:#100000;color:#ef4444;border-color:#2a0000;text-decoration:line-through;opacity:.5;}
.mode-bar{display:flex;gap:8px;margin-bottom:12px;}
.mode-btn{flex:1;padding:14px;background:#0e0e10;color:#555;border:2px solid #1a1a1e;border-radius:10px;font-family:'Black Ops One',sans-serif;font-size:14px;letter-spacing:2px;text-align:center;transition:all .2s;}
.mode-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,.06);}
.setting-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.setting-label{font-size:12px;color:#555;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;font-weight:700;min-width:100px;}
.stepper{display:flex;align-items:center;gap:0;}
.stepper-btn{width:36px;height:36px;background:#0e0e10;color:var(--cyan);border:1px solid #1a1a1e;font-size:18px;font-weight:900;display:flex;align-items:center;justify-content:center;}
.stepper-btn:first-child{border-radius:8px 0 0 8px;}.stepper-btn:last-child{border-radius:0 8px 8px 0;}
.stepper-val{padding:6px 16px;background:#060608;color:#fff;border-top:1px solid #1a1a1e;border-bottom:1px solid #1a1a1e;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;min-width:50px;text-align:center;}
.verse-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;max-height:200px;overflow-y:auto;}
.verse-row{display:flex;gap:8px;align-items:center;}
.verse-info{flex:1;padding:10px 14px;background:#0e0e10;border:1px solid #1a1a1e;border-radius:8px;cursor:pointer;}
.verse-text{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:var(--cyan);letter-spacing:1px;}
.verse-ref{font-size:11px;color:#444;margin-top:2px;}

/* ── TIC TAC TOE STYLES ── */
.ttt-label{color:var(--purple);}
.op-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:400px;margin:0 auto 16px;}
.op-cell{aspect-ratio:1;background:#0e0e10;border:2px solid #1a1a1e;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Black Ops One',sans-serif;font-size:28px;color:#555;cursor:pointer;transition:all .2s;user-select:none;}
.op-cell:active{transform:scale(.95);}
.op-cell.taken-X{background:rgba(34,211,238,.1);color:var(--teamX);border-color:rgba(34,211,238,.3);cursor:default;}
.op-cell.taken-O{background:rgba(245,158,11,.1);color:var(--teamO);border-color:rgba(245,158,11,.3);cursor:default;}
.op-cell.active-cell{background:rgba(168,85,247,.15);border-color:var(--purple);color:var(--purple);}
.op-question{padding:16px;background:#0a0a0c;border:1px solid var(--purple);border-radius:12px;margin-bottom:12px;}
.op-q-text{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--purple);letter-spacing:1px;margin-bottom:8px;}
.op-a-text{font-size:14px;color:var(--green);letter-spacing:1px;}
.q-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;max-height:300px;overflow-y:auto;}
.q-row{display:flex;gap:8px;align-items:center;}
.q-info{flex:1;padding:10px 14px;background:#0e0e10;border:1px solid #1a1a1e;border-radius:8px;}
.q-text{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:var(--purple);letter-spacing:1px;}
.q-answer{font-size:11px;color:#444;margin-top:2px;}
.team-indicator{text-align:center;padding:10px;font-family:'Black Ops One',sans-serif;font-size:18px;letter-spacing:3px;margin-bottom:12px;}
.team-X{color:var(--teamX);text-shadow:0 0 20px rgba(34,211,238,.4);}
.team-O{color:var(--teamO);text-shadow:0 0 20px rgba(245,158,11,.4);}
.ctrl-btn.correct{background:linear-gradient(135deg,var(--green),#16a34a);color:#000;font-family:'Black Ops One',sans-serif;font-size:13px;letter-spacing:2px;}
.ctrl-btn.wrong{background:linear-gradient(135deg,var(--red),#dc2626);color:#fff;font-family:'Black Ops One',sans-serif;font-size:13px;letter-spacing:2px;}

/* ── SHARED ── */
.del-btn{width:32px;height:32px;background:#1a0000;color:var(--red);border:1px solid #2a0000;border-radius:7px;font-size:14px;flex-shrink:0;}
.add-input{width:100%;padding:11px 14px;background:#0e0e10;border:1px solid #1a1a1e;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:1px;}
.add-input::placeholder{color:#2a2a2a;letter-spacing:1px;}
.add-btn{flex:1;padding:11px;font-family:'Black Ops One',sans-serif;font-size:14px;letter-spacing:2px;border-radius:8px;color:#000;}
.start-btn{width:100%;margin-top:12px;padding:17px;color:#000;font-family:'Black Ops One',sans-serif;font-size:18px;letter-spacing:4px;border-radius:10px;}
.theme-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.theme-chip{width:32px;height:32px;border-radius:7px;font-size:16px;background:transparent;border:1px solid transparent;transition:all .15s;}

/* ── AUDIENCE ── */
#audience{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);overflow:hidden;}
.aud-glow{position:fixed;bottom:0;left:0;width:100%;height:40%;pointer-events:none;}
.waiting{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;height:100%;}
.waiting-title{font-family:'Black Ops One',sans-serif;font-size:clamp(32px,8vw,72px);letter-spacing:6px;color:var(--purple);text-shadow:0 0 40px rgba(168,85,247,.5);}
.waiting-label{font-size:clamp(12px,2.5vw,16px);color:#444;letter-spacing:3px;text-transform:uppercase;}

/* PF Audience */
.board-wrap{position:relative;flex-shrink:0;}
.tile{border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Black Ops One',sans-serif;user-select:none;letter-spacing:1px;transition:all .38s cubic-bezier(.34,1.4,.64,1);flex-shrink:0;}

/* TTT Audience */
.aud-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,2vw,16px);width:min(80vh,80vw);max-width:700px;}
.aud-cell{aspect-ratio:1;border-radius:clamp(12px,2vw,20px);display:flex;align-items:center;justify-content:center;font-family:'Black Ops One',sans-serif;user-select:none;transition:all .4s cubic-bezier(.34,1.4,.64,1);position:relative;}
.aud-cell.number{background:#0a0a0c;border:3px solid #1a1a1e;color:#444;font-size:clamp(32px,6vw,64px);}
.aud-cell.X{background:rgba(34,211,238,.12);border:3px solid rgba(34,211,238,.4);color:var(--teamX);font-size:clamp(48px,10vw,96px);text-shadow:0 0 30px rgba(34,211,238,.5);}
.aud-cell.O{background:rgba(245,158,11,.12);border:3px solid rgba(245,158,11,.4);color:var(--teamO);font-size:clamp(48px,10vw,96px);text-shadow:0 0 30px rgba(245,158,11,.5);}
.aud-cell.win-cell{animation:winPulse 1s ease-in-out infinite;}
.aud-question-overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(3,3,4,.95);z-index:50;animation:fadeIn .3s ease;}
.aud-q-text{font-family:'Black Ops One',sans-serif;font-size:clamp(24px,5vw,56px);color:#fff;text-align:center;padding:0 40px;letter-spacing:3px;line-height:1.4;max-width:900px;animation:scaleIn .4s cubic-bezier(.34,1.4,.64,1);}
.aud-q-team{font-family:'Barlow Condensed',sans-serif;font-size:clamp(14px,2.5vw,24px);letter-spacing:4px;margin-top:20px;text-transform:uppercase;}
.win-overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(3,3,4,.9);z-index:60;animation:fadeIn .5s ease;}
.win-text{font-family:'Black Ops One',sans-serif;font-size:clamp(36px,8vw,80px);letter-spacing:8px;}
.win-banner{font-family:'Black Ops One',sans-serif;font-size:clamp(18px,4vw,36px);letter-spacing:6px;color:var(--gold);text-align:center;margin-top:16px;animation:winFlash 1s ease-in-out infinite;}

/* ── THE GRID ── */
.grid-label{color:var(--green);}
.hub-tab.active-grid{color:var(--green);border-bottom-color:var(--green);}
.hub-tab.active-sb{color:var(--gold);border-bottom-color:var(--gold);}
.hub-tab.active-cd{color:var(--red);border-bottom-color:var(--red);}
.hub-tab.active-nw{color:var(--gold);border-bottom-color:var(--gold);}
.hub-tab.active-cc{color:var(--gold);border-bottom-color:var(--gold);}
.cc-scores{display:flex;gap:clamp(8px,2vw,20px);margin-bottom:clamp(12px,2vw,24px);}
.cc-sc-card{padding:clamp(8px,1.5vw,16px) clamp(12px,2vw,24px);background:#0a0a0c;border-radius:clamp(8px,1vw,14px);text-align:center;min-width:clamp(80px,15vw,160px);transition:all .3s;}
.cc-sc-card.active{box-shadow:0 0 20px rgba(245,158,11,.3);}
.cc-sc-name{font-family:'Barlow Condensed',sans-serif;font-size:clamp(10px,1.8vw,16px);letter-spacing:2px;font-weight:700;}
.cc-sc-val{font-family:'Black Ops One',sans-serif;font-size:clamp(18px,3.5vw,36px);letter-spacing:2px;}
.cc-label{color:var(--gold);}
.op-pyramid{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:16px;}
.pyr-row{display:flex;gap:8px;justify-content:center;}
.pyr-cell{padding:12px 20px;background:#0e0e10;border:2px solid #1a1a1e;border-radius:10px;font-family:'Black Ops One',sans-serif;font-size:14px;color:#555;cursor:pointer;text-align:center;min-width:100px;transition:all .2s;letter-spacing:1px;}
.pyr-cell:active{transform:scale(.95);}
.pyr-cell.done{background:#060606;color:#222;border-color:#0a0a0a;cursor:default;}
.pyr-cell.active{border-color:var(--gold);color:var(--gold);background:rgba(245,158,11,.08);}
.round-box{padding:16px;background:#0a0a0c;border:1px solid var(--gold);border-radius:12px;margin-bottom:12px;text-align:center;}
.round-cat{font-family:'Black Ops One',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold);margin-bottom:6px;}
.round-word{font-family:'Black Ops One',sans-serif;font-size:28px;letter-spacing:3px;color:#fff;margin-bottom:8px;}
.round-counter{font-size:11px;color:#333;letter-spacing:1px;}
.round-timer{font-family:'Black Ops One',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:8px;}
.round-btns{display:flex;gap:8px;justify-content:center;margin-top:10px;}
.btn-got{padding:12px 28px;background:linear-gradient(135deg,var(--green),#16a34a);color:#000;font-family:'Black Ops One',sans-serif;font-size:16px;letter-spacing:2px;border-radius:10px;}
.btn-got:active{transform:scale(.95);}
.btn-pass{padding:12px 28px;background:linear-gradient(135deg,#555,#333);color:#fff;font-family:'Black Ops One',sans-serif;font-size:16px;letter-spacing:2px;border-radius:10px;}
.btn-pass:active{transform:scale(.95);}
.aud-pyramid{display:flex;flex-direction:column;align-items:center;gap:clamp(12px,2.5vw,24px);}
.aud-pyr-row{display:flex;gap:clamp(12px,2.5vw,24px);justify-content:center;}
.aud-pyr-cell{padding:clamp(24px,4.5vw,56px) clamp(32px,5vw,72px);background:#0a0a0c;border:3px solid #1a1a1e;border-radius:clamp(12px,2vw,22px);font-family:'Black Ops One',sans-serif;font-size:clamp(18px,3.5vw,40px);color:#444;text-align:center;min-width:clamp(140px,22vw,300px);letter-spacing:3px;transition:all .3s;}
.aud-pyr-cell.done{background:#060606;color:#1a1a1a;border-color:#0a0a0a;}
.aud-pyr-cell.active{border-color:var(--gold);color:var(--gold);background:rgba(245,158,11,.1);box-shadow:0 0 25px rgba(245,158,11,.3);animation:cellPulse .8s ease-in-out infinite;}
.aud-pyr-cell.won{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.1);}
.aud-word-display{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(3,3,4,.95);z-index:50;}
.aud-word-big{font-family:'Black Ops One',sans-serif;font-size:clamp(48px,12vw,120px);color:#fff;letter-spacing:clamp(4px,1vw,12px);text-align:center;padding:0 30px;}
.aud-word-big.pop{animation:scaleIn .3s cubic-bezier(.34,1.4,.64,1);}
.aud-word-cat{font-family:'Barlow Condensed',sans-serif;font-size:clamp(16px,3vw,28px);color:var(--gold);letter-spacing:4px;margin-bottom:clamp(12px,2vw,24px);text-transform:uppercase;}
.aud-word-pts{font-family:'Black Ops One',sans-serif;font-size:clamp(14px,2.5vw,24px);letter-spacing:3px;margin-top:clamp(12px,2vw,24px);opacity:.5;}
.aud-word-timer{font-family:'Black Ops One',sans-serif;font-size:clamp(24px,5vw,48px);letter-spacing:4px;margin-top:clamp(8px,1.5vw,16px);}
.nw-board{display:grid;gap:clamp(6px,1vw,12px);width:96vw;max-width:1400px;}
.nw-sq{border-radius:clamp(10px,1.5vw,20px);display:flex;align-items:center;justify-content:center;font-family:'Black Ops One',sans-serif;font-size:clamp(18px,4vw,44px);letter-spacing:2px;user-select:none;transition:all .15s;text-align:center;padding:clamp(12px,2vw,24px) 6px;word-break:break-word;line-height:1.2;}
.nw-sq.idle{background:#0a0a0c;border:2px solid #1a1a1e;color:#555;}
.nw-sq.lit{border:2px solid var(--gold);background:rgba(245,158,11,.2);color:var(--gold);box-shadow:0 0 20px rgba(245,158,11,.4);transform:scale(1.05);}
.nw-sq.landed{animation:nwFlash .5s ease-in-out 3;}
.nw-sq.landed.whammy-sq{background:rgba(239,68,68,.25);border-color:var(--red);color:var(--red);box-shadow:0 0 30px rgba(239,68,68,.5);animation:nwShake .4s ease 3;}
.nw-scores-bar{display:flex;gap:clamp(8px,2vw,20px);margin-bottom:clamp(12px,2vw,24px);}
.nw-player{padding:clamp(8px,1.5vw,16px) clamp(12px,2vw,24px);background:#0a0a0c;border-radius:clamp(8px,1vw,14px);text-align:center;min-width:clamp(80px,15vw,160px);}
.nw-player.active{box-shadow:0 0 20px rgba(245,158,11,.3);}
.nw-player-name{font-family:'Barlow Condensed',sans-serif;font-size:clamp(10px,1.8vw,16px);letter-spacing:2px;font-weight:700;}
.nw-player-score{font-family:'Black Ops One',sans-serif;font-size:clamp(18px,3.5vw,36px);letter-spacing:2px;}
.nw-result-overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;animation:fadeIn .3s ease;}
.nw-result-overlay.prize{background:rgba(3,3,4,.85);}.nw-result-overlay.whammy{background:rgba(30,0,0,.9);}
.nw-result-text{font-family:'Black Ops One',sans-serif;font-size:clamp(36px,8vw,80px);letter-spacing:6px;text-align:center;padding:0 20px;}
.nw-result-sub{font-family:'Barlow Condensed',sans-serif;font-size:clamp(14px,3vw,28px);letter-spacing:4px;margin-top:16px;opacity:.6;}
.big-stop{width:100%;padding:24px;background:linear-gradient(135deg,var(--red),#dc2626);color:#fff;font-family:'Black Ops One',sans-serif;font-size:28px;letter-spacing:6px;border-radius:14px;box-shadow:0 8px 40px rgba(239,68,68,.4);margin-bottom:16px;max-width:400px;}
.big-stop:active{transform:scale(.95);}
.big-spin{width:100%;padding:24px;background:linear-gradient(135deg,var(--gold),#d97706);color:#000;font-family:'Black Ops One',sans-serif;font-size:28px;letter-spacing:6px;border-radius:14px;box-shadow:0 8px 40px rgba(245,158,11,.4);margin-bottom:16px;max-width:400px;}
.big-spin:active{transform:scale(.95);}
.nw-op-result{padding:16px;background:#0a0a0c;border-radius:12px;text-align:center;margin-bottom:12px;font-family:'Black Ops One',sans-serif;font-size:20px;letter-spacing:3px;max-width:400px;}
.nw-op-scores{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.nw-op-scard{flex:1;min-width:80px;padding:8px;background:#0a0a0c;border:2px solid #1a1a1e;border-radius:8px;text-align:center;}
.nw-op-scard.active{box-shadow:0 0 15px rgba(245,158,11,.2);}
.nw-op-sname{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;font-weight:700;}
.nw-op-sval{font-family:'Black Ops One',sans-serif;font-size:20px;letter-spacing:2px;}
.sq-list{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;max-height:250px;overflow-y:auto;}
.sq-row{display:flex;gap:6px;align-items:center;}
.sq-row input{flex:1;padding:8px 10px;background:#0e0e10;border:1px solid #1a1a1e;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1px;color:var(--gold);}
.sq-row input.whammy{color:var(--red);}
.sq-row input::placeholder{color:#222;}

<script>
// ══════════════════════════════════════════════════════════════════════════════
// GAME HUB — Unified Operator Dashboard
// ══════════════════════════════════════════════════════════════════════════════

const ipc=(typeof require!=='undefined')?require('electron').ipcRenderer:null;
const ROLE=(window.location.hash||'').replace('#','').trim()||'operator';
const ALPHA='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

// ── SHARED HELPERS ──
function el(tag,props,...kids){const e=document.createElement(tag);for(const[k,v]of Object.entries(props||{})){if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k==='onClick')e.addEventListener('click',v);else if(k==='onInput')e.addEventListener('input',v);else if(k==='onKeydown')e.addEventListener('keydown',v);else if(k==='className')e.className=v;else if(k==='disabled')e.disabled=!!v;else if(k==='placeholder')e.placeholder=v;else if(k==='value'&&(tag==='input'||tag==='textarea'))e.value=v;else if(k==='type')e.type=v;}kids.flat().forEach(k=>{if(k!=null&&k!==false)e.appendChild(typeof k==='string'?document.createTextNode(k):k);});return e;}
function mk(s){const d=document.createElement('div');Object.assign(d.style,s);return d;}
function copy(x){return JSON.parse(JSON.stringify(x));}
function lhex(h,p){h=h.replace('#','');let r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);r=Math.min(255,r+p);g=Math.min(255,g+p);b=Math.min(255,b+p);return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');}
function dhex(h,p){return lhex(h,-p);}
function rgba(h,a){h=h.replace('#','');return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;}

const THEMES={rocket:{e:'🚀',a:'#60a5fa',f:'#060e1a',t:'#3b82f6'},train:{e:'🚂',a:'#f59e0b',f:'#1a0e00',t:'#d97706'},trophy:{e:'🏆',a:'#fbbf24',f:'#1a1200',t:'#f59e0b'},arcade:{e:'🕹️',a:'#4ade80',f:'#021008',t:'#16a34a'},surf:{e:'🏄',a:'#22d3ee',f:'#001a1a',t:'#0891b2'},portal:{e:'🌌',a:'#a855f7',f:'#0e0718',t:'#7c3aed'},surge:{e:'⚡',a:'#eab308',f:'#100d00',t:'#ca8a04'},neon:{e:'🌃',a:'#e879f9',f:'#0d0014',t:'#c026d3'},guitar:{e:'🎸',a:'#f43f5e',f:'#1a000a',t:'#be123c'},gem:{e:'💎',a:'#38bdf8',f:'#001018',t:'#0284c7'}};
const THEME_ORDER=Object.keys(THEMES);
function themeMeta(tid){const th=THEMES[tid]||THEMES.rocket;return{accent:th.a,frame:th.f,tile:th.t,tileReveal:`linear-gradient(150deg,${lhex(th.t,60)},${th.t},${dhex(th.t,40)})`,tileText:(parseInt(th.t.replace('#','').slice(0,2),16)*.299+parseInt(th.t.replace('#','').slice(2,4),16)*.587+parseInt(th.t.replace('#','').slice(4,6),16)*.114)>140?'#000':'#fff',tileGlow:rgba(th.a,.75),confetti:[th.a,lhex(th.a,60),'#fff',th.t,lhex(th.t,80),dhex(th.a,30)]};}

// ── SHARED SOUNDS ──
let _ctx=null;
function ac(){if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();if(_ctx.state==='suspended')_ctx.resume();return _ctx;}
function tone(c,type,freq,t0,t1,pk,fd){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type;o.frequency.setValueAtTime(freq,t0);g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(pk,t0+.015);g.gain.setValueAtTime(pk,fd||t0+.015);g.gain.exponentialRampToValueAtTime(.001,t1);o.start(t0);o.stop(t1+.01);}
function soundCorrect(){try{const c=ac(),n=c.currentTime;[[523,0],[659,.1],[784,.2],[1047,.35]].forEach(([f,t])=>{tone(c,'square',f,n+t,n+t+.3,.12,n+t+.06);tone(c,'sine',f,n+t,n+t+.35,.18,n+t+.08);});}catch(e){}}
function soundWrong(){try{const c=ac(),n=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.setValueAtTime(200,n);o.frequency.exponentialRampToValueAtTime(60,n+.7);g.gain.setValueAtTime(.3,n);g.gain.exponentialRampToValueAtTime(.001,n+.75);o.start(n);o.stop(n+.78);}catch(e){}}
function soundSolve(){try{const c=ac(),n=c.currentTime;[[392,0],[523,.15],[659,.3],[784,.48],[880,.63],[1047,.82]].forEach(([f,t],i)=>{const v=.12+i*.03;tone(c,'square',f,n+t,n+t+.5,v*.6,n+t+.1);tone(c,'sine',f,n+t,n+t+.6,v,n+t+.12);tone(c,'sine',f*2,n+t+.02,n+t+.45,v*.3,n+t+.08);});[1047,1319,1568].forEach(f=>{tone(c,'sine',f,n+1.0,n+2.2,.1,n+1.3);});}catch(e){}}
function soundDrop(){try{const c=ac(),n=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(900,n);o.frequency.exponentialRampToValueAtTime(80,n+.5);g.gain.setValueAtTime(.3,n);g.gain.exponentialRampToValueAtTime(.001,n+.55);o.start(n);o.stop(n+.6);}catch(e){}}
function soundReveal(){soundSolve();}
function soundSelect(){try{const c=ac(),n=c.currentTime;tone(c,'sine',660,n,n+.12,.15,n+.03);tone(c,'sine',880,n+.06,n+.15,.1,n+.08);}catch(e){}}
function soundWompWomp(){try{const c=ac(),n=c.currentTime;const o1=c.createOscillator(),g1=c.createGain();o1.connect(g1);g1.connect(c.destination);o1.type='sawtooth';o1.frequency.setValueAtTime(311,n);o1.frequency.exponentialRampToValueAtTime(233,n+.45);g1.gain.setValueAtTime(.2,n);g1.gain.exponentialRampToValueAtTime(.001,n+.5);o1.start(n);o1.stop(n+.55);const o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o2.type='sawtooth';o2.frequency.setValueAtTime(233,n+.55);o2.frequency.exponentialRampToValueAtTime(147,n+1.3);g2.gain.setValueAtTime(.2,n+.55);g2.gain.exponentialRampToValueAtTime(.001,n+1.4);o2.start(n+.55);o2.stop(n+1.45);}catch(e){}}
function soundTick(r){try{const c=ac(),n=c.currentTime;if(r<=5){const p=600+((5-r)*120);tone(c,'square',p,n,n+.08,.2,n+.02);tone(c,'square',p*1.25,n+.1,n+.18,.2,n+.12);}else if(r<=10){tone(c,'sine',500+((10-r)*50),n,n+.1,.1+((10-r)*.025),n+.03);}else{tone(c,'sine',800,n,n+.04,.06,n+.01);}}catch(e){}}
function soundTimesUp(){try{const c=ac(),n=c.currentTime;[[150,0],[180,0],[220,0]].forEach(([f,t])=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.setValueAtTime(f,n+t);g.gain.setValueAtTime(.2,n+t);g.gain.exponentialRampToValueAtTime(.001,n+t+.8);o.start(n+t);o.stop(n+t+.85);});}catch(e){}}

// ── CONFETTI ──
function spawnConfetti(colors){
  if(document.querySelector('.conf'))return;

function addToScoreboard(teamIdx,points){

  // Auto-start scoreboard if still in setup
  if(SB.screen==='setup')SB.screen='game';
}

const LICENSE_DIR = (function(){
  if(!_fs||!_path)return null;
  const d = _path.join(require('os').homedir(),'Library','Application Support','Game Hub');
  try{_fs.mkdirSync(d,{recursive:true});}catch(e){}
  return d;
})();

function _sha256(s){
  // Use Node crypto since Electron renderer has nodeIntegration enabled
  try{const crypto=require('crypto');return crypto.createHash('sha256').update(s).digest('hex');}catch(e){return '';}
}

function loadLicense(){
  if(_fs&&LICENSE_DIR){
    try{return JSON.parse(_fs.readFileSync(_path.join(LICENSE_DIR,'license.json'),'utf8'));}catch(e){}
  }
  return {activated:[]};
}
function saveLicense(data){
  if(_fs&&LICENSE_DIR){
    try{_fs.writeFileSync(_path.join(LICENSE_DIR,'license.json'),JSON.stringify(data));}catch(e){}
  }
}

let LICENSE = loadLicense();

// Game prefix map — which prefix unlocks which game
const GAME_PREFIX = {
  pf:'PF', wd:'WD', ttt:'TTT', grid:'GRD', nw:'NW', cc:'CC'
};
// Games that don't require a license (free)
const FREE_GAMES = ['sb','cd'];

function isGameUnlocked(gameId){
  if(FREE_GAMES.includes(gameId)) return true;
  if(!LICENSE.activated || !LICENSE.activated.length) return false;
  const prefix = GAME_PREFIX[gameId];
  // Check if any master key OR this game's specific key is activated
  return LICENSE.activated.some(hash => {
    if(LICENSE_HASHES.MST && LICENSE_HASHES.MST.includes(hash)) return true;
    if(prefix && LICENSE_HASHES[prefix] && LICENSE_HASHES[prefix].includes(hash)) return true;
    return false;
  });
}

function activateKey(keyInput, gameId){
  const key = (keyInput||'').trim().toUpperCase();
  if(!key) return {ok:false, msg:'Enter a key'};
  const hash = _sha256(key);
  // Check if hash matches any known key
  let matched = false;
  for(const prefix of Object.keys(LICENSE_HASHES)){
    if(LICENSE_HASHES[prefix].includes(hash)){matched = true; break;}
  }
  if(!matched) return {ok:false, msg:'Invalid key — check for typos'};
  if(!LICENSE.activated) LICENSE.activated = [];
  if(LICENSE.activated.includes(hash)) return {ok:false, msg:'This key is already activated'};
  LICENSE.activated.push(hash);
  LICENSE.date = Date.now();
  saveLicense(LICENSE);
  return {ok:true, msg:'Unlocked!'};
}

// ── TIMER TICKS (Word Drop + Countdown + Clue Climb) ──
// Only re-render when a timer is actively running, and only for the active game
let _lastTickSec=-1,_timerInt=null;
let _cdLastTick=-1;
let _ccLastTick=-1;
let _ccLastWord='';
function startTimerTick(){if(_timerInt)clearInterval(_timerInt);_lastTickSec=-1;_cdLastTick=-1;_ccLastTick=-1;_timerInt=setInterval(()=>{
  let needsRender=false;
  // Word Drop timer — only tick if WD is the active game or audience
  if(WD.timerRunning&&WD.timerEnd){
    const rem=Math.max(0,Math.ceil((WD.timerEnd-Date.now())/1000));
    if(rem!==_lastTickSec&&rem>0){soundTick(rem);_lastTickSec=rem;}
    if(rem<=0&&_lastTickSec!==0){_lastTickSec=0;soundTimesUp();if(ROLE==='operator')setTimeout(()=>{soundWompWomp();setState('wd',{revealed:true,timedOut:true,timerRunning:false});},1000);return;}
    if(activeGame==='wd')needsRender=true;
  }
  // Countdown timer — only tick if CD is the active game or audience
  if(CD.running&&CD.timerEnd){
    const rem=Math.max(0,Math.ceil((CD.timerEnd-Date.now())/1000));
    if(rem!==_cdLastTick&&rem>0){soundCDTick(rem);_cdLastTick=rem;}
    if(rem<=0&&_cdLastTick!==0){_cdLastTick=0;soundCDTimesUp();setTimeout(soundWompWomp,200);if(ROLE==='operator')setState('cd',{running:false,result:'expired'});return;}
    if(activeGame==='cd')needsRender=true;
  }
  // Clue Climb timer — only update on second change
  if(CC.timerRunning&&CC.timerEnd){
    const rem=Math.max(0,Math.ceil((CC.timerEnd-Date.now())/1000));
    if(rem!==_ccLastTick&&rem>0){soundTick(rem);_ccLastTick=rem;if(activeGame==='cc')needsRender=true;}
    if(rem<=0&&_ccLastTick!==0){_ccLastTick=0;if(ROLE==='operator'){const pyrRow=CC_PYR_LAYOUT.findIndex(r=>r.includes(CC.activeCat));const pts=CC_PYR_POINTS[pyrRow]||100;const ns=[...CC.scores];ns[CC.currentTeam]+=CC.wordsGotten*pts;const nd=[...CC.catDone];nd[CC.activeCat]=true;const nw=[...CC.catWinner];nw[CC.activeCat]=CC.currentTeam;soundTimesUp();setState('cc',{timerRunning:false,roundOver:true,scores:ns,catDone:nd,catWinner:nw,gameOver:nd.every(d=>d)});}return;}
  }
  if(needsRender)render();
},250);}

// ── IPC SUBSCRIBE ──
function subscribeIPC(){
  if(!ipc)return;
  ipc.on('hub-state',(event,s)=>{
    if(!s)return;
    const prevPF=copy(PF),prevWD=copy(WD),prevTTT=copy(TTT);
    activeGame=s.activeGame||activeGame;
    if(s.pf)PF=s.pf;if(s.wd)WD=s.wd;if(s.ttt)TTT=s.ttt;if(s.grid)GRID=s.grid;if(s.sb)SB=s.sb;
    if(s.cd){const prevCD=CD;CD=s.cd;if(ROLE==='audience'){if(CD.result==='finished'&&prevCD.result!==CD.result){soundCDFinished();setTimeout(()=>spawnConfetti(),200);}if(CD.result==='expired'&&prevCD.result!==CD.result){soundCDTimesUp();setTimeout(soundWompWomp,200);}}}
    if(s.nw){const prevNW=NW;NW=s.nw;if(ROLE==='audience'){if(NW.landed&&!prevNW.landed){if(NW.landed.square.whammy)soundNWWhammy();else{soundNWPrize();if(NW.landed.square.value>=500)setTimeout(()=>spawnConfetti(),100);}}if(NW.spinning&&!prevNW.spinning)startNWAudSpin();if(!NW.spinning&&prevNW.spinning)stopNWAudSpin();}}
    if(s.cc){const prevCC=CC;CC=s.cc;if(ROLE==='audience'){if(CC.roundOver&&!prevCC.roundOver&&CC.wordsGotten>0)soundCCCatWon();if(CC.roundOver&&!prevCC.roundOver&&CC.wordsGotten===0)soundTimesUp();if(CC.gameOver&&!prevCC.gameOver){soundSolve();setTimeout(()=>spawnConfetti(),300);}}}
    if(ROLE==='audience'){
      // PF sounds
      if(PF.won&&!prevPF.won){soundSolve();setTimeout(()=>spawnConfetti(),100);}
      // WD sounds
      if(s.wd){const nd=new Set(WD.dropped||[]),pd=new Set(prevWD.dropped||[]);for(const idx of nd){if(!pd.has(idx))soundDrop();}if(WD.revealed&&!prevWD.revealed){if(WD.timedOut)soundWompWomp();else{soundReveal();setTimeout(()=>spawnConfetti(),300);}}}
      // TTT sounds
      if(s.ttt&&prevTTT.board){for(let i=0;i<9;i++){if(!prevTTT.board[i]&&TTT.board[i])soundCorrect();}if(prevTTT.activeCell!==null&&TTT.activeCell===null&&!TTT.board[prevTTT.activeCell])soundWompWomp();if(TTT.winner&&TTT.winner!=='draw'&&!prevTTT.winner){soundSolve();setTimeout(()=>spawnConfetti(TTT.winner==='X'?['#22d3ee','#06b6d4','#fff']:['#f59e0b','#d97706','#fff']),300);}}
    }
    render();
  });
  ipc.on('hub-request',()=>{if(ROLE==='operator')pushState();});
  if(ROLE==='audience')ipc.send('hub-request');
}

// ── UPDATE CHECK ──
const APP_VERSION='1.0.5';
const UPDATE_URL='https://raw.githubusercontent.com/pastorderek81/pointegames/main/updates.json';
let updateInfo=null;
let _updateMsg='';
async function checkForUpdates(){
  try{
    const r=await fetch(UPDATE_URL+'?t='+Date.now(),{cache:'no-store'});
    if(!r.ok)return;
    const data=await r.json();
    if(data.gamehub&&data.gamehub.version&&data.gamehub.version!==APP_VERSION){
      updateInfo=data.gamehub;
      render();
    }
  }catch(e){}
}

// ── INIT ──
subscribeIPC();
startTimerTick();
render();
setTimeout(checkForUpdates,3000);
if(ipc)ipc.on('update-progress',(event,msg)=>{_updateMsg=msg;render();});
</script>
