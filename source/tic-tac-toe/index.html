<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Tic Tac Toe</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#f59e0b;--cyan:#22d3ee;--purple:#a855f7;--red:#ef4444;--green:#4ade80;
  --bg:#030304;--surface:#0a0a0c;--border:#1a1a1e;
  --teamX:#22d3ee;--teamO:#f59e0b;
}
html,body{width:100%;height:100%;background:var(--bg);color:#fff;font-family:'Nunito',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
input{outline:none;font-family:inherit;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}

/* ── LOBBY ── */
#lobby{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;background:radial-gradient(ellipse at 50% 0%,#1a0a2e 0%,#030304 60%);z-index:100;}
.lobby-title{font-family:'Black Ops One',sans-serif;font-size:clamp(32px,8vw,72px);letter-spacing:6px;color:var(--purple);text-shadow:0 0 40px rgba(168,85,247,.5),0 0 80px rgba(168,85,247,.2);margin-bottom:8px;}
.lobby-sub{font-size:clamp(11px,2.5vw,14px);color:#444;letter-spacing:3px;text-transform:uppercase;margin-bottom:48px;}
.lobby-card{background:#0a0a0c;border:1px solid #1a1a1e;border-radius:20px;padding:32px;width:min(420px,90vw);display:flex;flex-direction:column;gap:16px;}
.lobby-label{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;}
.lobby-input{width:100%;padding:14px 16px;background:#060608;border:1px solid #222;border-radius:10px;color:#fff;font-size:18px;font-family:'Barlow Condensed',sans-serif;letter-spacing:4px;text-transform:uppercase;}
.lobby-input::placeholder{color:#333;letter-spacing:2px;}
.lobby-divider{display:flex;align-items:center;gap:12px;color:#222;font-size:11px;}
.lobby-divider::before,.lobby-divider::after{content:'';flex:1;height:1px;background:#1a1a1e;}
.btn-primary{padding:15px;background:linear-gradient(135deg,var(--purple),#7e22ce);color:#fff;font-family:'Black Ops One',sans-serif;font-size:16px;letter-spacing:3px;border-radius:10px;box-shadow:0 4px 20px rgba(168,85,247,.3);transition:transform .15s;}
.btn-primary:active{transform:scale(.97);}
.btn-secondary{padding:15px;background:transparent;color:#444;border:1px solid #1a1a1e;font-family:'Black Ops One',sans-serif;font-size:16px;letter-spacing:3px;border-radius:10px;}

/* ── OPERATOR ── */
#operator{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
.op-topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#030304;border-bottom:1px solid #111;flex-shrink:0;min-height:52px;}
.op-title{font-family:'Black Ops One',sans-serif;font-size:15px;letter-spacing:3px;color:var(--purple);}
.op-room{font-size:11px;color:#333;letter-spacing:2px;}
.op-topbtns{display:flex;gap:8px;align-items:center;}
.op-btn{padding:6px 12px;background:#0e0e10;color:#555;border:1px solid #111;border-radius:7px;font-size:11px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;font-weight:700;}
.op-scroll{flex:1;overflow-y:auto;padding:12px 14px;}
.section-label{font-size:9px;color:var(--purple);font-weight:900;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;margin-top:16px;}

/* Controls */
.ctrl-bar{display:flex;gap:5px;padding:8px 14px;background:#040404;border-bottom:1px solid #0a0a0a;flex-shrink:0;flex-wrap:wrap;align-items:center;}
.ctrl-btn{padding:7px 13px;background:#0e0e10;color:#555;border:1px solid #111;border-radius:7px;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;}
.ctrl-btn.correct{background:linear-gradient(135deg,var(--green),#16a34a);color:#000;font-family:'Black Ops One',sans-serif;font-size:13px;letter-spacing:2px;box-shadow:0 4px 14px rgba(74,222,128,.3);}
.ctrl-btn.wrong{background:linear-gradient(135deg,var(--red),#dc2626);color:#fff;font-family:'Black Ops One',sans-serif;font-size:13px;letter-spacing:2px;box-shadow:0 4px 14px rgba(239,68,68,.3);}

/* Operator grid */
.op-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:400px;margin:0 auto 16px;}
.op-cell{aspect-ratio:1;background:#0e0e10;border:2px solid #1a1a1e;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Black Ops One',sans-serif;font-size:28px;color:#555;cursor:pointer;transition:all .2s;user-select:none;}
.op-cell:active{transform:scale(.95);}
.op-cell.taken-X{background:rgba(34,211,238,.1);color:var(--teamX);border-color:rgba(34,211,238,.3);cursor:default;}
.op-cell.taken-O{background:rgba(245,158,11,.1);color:var(--teamO);border-color:rgba(245,158,11,.3);cursor:default;}
.op-cell.active-cell{background:rgba(168,85,247,.15);border-color:var(--purple);color:var(--purple);}

/* Question display (operator) */
.op-question{padding:16px;background:#0a0a0c;border:1px solid var(--purple);border-radius:12px;margin-bottom:12px;}
.op-q-text{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--purple);letter-spacing:1px;margin-bottom:8px;}
.op-a-text{font-size:14px;color:var(--green);letter-spacing:1px;}

/* Question list (setup) */
.q-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;max-height:300px;overflow-y:auto;}
.q-row{display:flex;gap:8px;align-items:center;}
.q-info{flex:1;padding:10px 14px;background:#0e0e10;border:1px solid #1a1a1e;border-radius:8px;}
.q-text{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:var(--purple);letter-spacing:1px;}
.q-answer{font-size:11px;color:#444;margin-top:2px;}
.del-btn{width:32px;height:32px;background:#1a0000;color:var(--red);border:1px solid #2a0000;border-radius:7px;font-size:14px;flex-shrink:0;}
.add-input{width:100%;padding:11px 14px;background:#0e0e10;border:1px solid #1a1a1e;border-radius:8px;color:var(--purple);font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:1px;}
.add-input::placeholder{color:#2a2a2a;letter-spacing:1px;}
.add-input.ans-input{color:var(--green);font-size:14px;}
.add-btn{flex:1;padding:11px;background:var(--purple);color:#fff;font-family:'Black Ops One',sans-serif;font-size:14px;letter-spacing:2px;border-radius:8px;}
.start-btn{width:100%;margin-top:12px;padding:17px;background:linear-gradient(135deg,var(--purple),#7e22ce);color:#fff;font-family:'Black Ops One',sans-serif;font-size:18px;letter-spacing:4px;border-radius:10px;box-shadow:0 4px 20px rgba(168,85,247,.3);}

/* Team indicator */
.team-indicator{text-align:center;padding:10px;font-family:'Black Ops One',sans-serif;font-size:18px;letter-spacing:3px;margin-bottom:12px;}
.team-X{color:var(--teamX);text-shadow:0 0 20px rgba(34,211,238,.4);}
.team-O{color:var(--teamO);text-shadow:0 0 20px rgba(245,158,11,.4);}

/* Theme chips */
.theme-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.theme-chip{width:32px;height:32px;border-radius:7px;font-size:16px;background:transparent;border:1px solid transparent;transition:all .15s;}
.theme-chip.active{border-color:var(--purple);background:rgba(168,85,247,.1);box-shadow:0 0 10px rgba(168,85,247,.25);}

/* ── AUDIENCE ── */
#audience{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);overflow:hidden;}
.aud-glow{position:fixed;bottom:0;left:0;width:100%;height:40%;background:radial-gradient(ellipse at 50% 100%,rgba(168,85,247,.04) 0%,transparent 70%);pointer-events:none;}

/* Audience grid */
.aud-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,2vw,16px);width:min(80vh,80vw);max-width:700px;}
.aud-cell{aspect-ratio:1;border-radius:clamp(12px,2vw,20px);display:flex;align-items:center;justify-content:center;font-family:'Black Ops One',sans-serif;user-select:none;transition:all .4s cubic-bezier(.34,1.4,.64,1);position:relative;}
.aud-cell.number{background:#0a0a0c;border:3px solid #1a1a1e;color:#444;font-size:clamp(32px,6vw,64px);cursor:default;}
.aud-cell.X{background:rgba(34,211,238,.12);border:3px solid rgba(34,211,238,.4);color:var(--teamX);font-size:clamp(48px,10vw,96px);text-shadow:0 0 30px rgba(34,211,238,.5);}
.aud-cell.O{background:rgba(245,158,11,.12);border:3px solid rgba(245,158,11,.4);color:var(--teamO);font-size:clamp(48px,10vw,96px);text-shadow:0 0 30px rgba(245,158,11,.5);}
.aud-cell.win-cell{animation:winPulse 1s ease-in-out infinite;}
.aud-cell.active-q{background:rgba(168,85,247,.15);border-color:var(--purple);color:var(--purple);animation:cellPulse .8s ease-in-out infinite;}

/* Audience question overlay */
.aud-question-overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(3,3,4,.95);z-index:50;animation:fadeIn .3s ease;}
.aud-q-text{font-family:'Black Ops One',sans-serif;font-size:clamp(24px,5vw,56px);color:#fff;text-align:center;padding:0 40px;letter-spacing:3px;line-height:1.4;max-width:900px;animation:scaleIn .4s cubic-bezier(.34,1.4,.64,1);}
.aud-q-team{font-family:'Barlow Condensed',sans-serif;font-size:clamp(14px,2.5vw,24px);letter-spacing:4px;margin-top:20px;text-transform:uppercase;}

/* Win overlay */
.win-overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(3,3,4,.9);z-index:60;animation:fadeIn .5s ease;}
.win-text{font-family:'Black Ops One',sans-serif;font-size:clamp(36px,8vw,80px);letter-spacing:8px;animation:winFlash 1s ease-in-out infinite;}

/* Waiting */
.waiting{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;height:100%;}
.waiting-code{font-family:'Black Ops One',sans-serif;font-size:clamp(48px,12vw,96px);letter-spacing:16px;color:var(--purple);text-shadow:0 0 30px rgba(168,85,247,.4);}
.waiting-label{font-size:clamp(12px,2.5vw,16px);color:#444;letter-spacing:3px;text-transform:uppercase;}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes scaleIn{from{opacity:0;transform:scale(.7);}to{opacity:1;transform:scale(1);}}
@keyframes winPulse{0%,100%{transform:scale(1);box-shadow:none;}50%{transform:scale(1.05);}}
@keyframes cellPulse{0%,100%{border-color:var(--purple);}50%{border-color:rgba(168,85,247,.2);}}
@keyframes winFlash{0%,100%{opacity:1;}50%{opacity:.6;}}
@keyframes confFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
@keyframes cellReveal{0%{transform:scale(0) rotateY(180deg);opacity:0;}60%{transform:scale(1.1) rotateY(0);opacity:1;}100%{transform:scale(1) rotateY(0);opacity:1;}}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

function _licenseDir(){

}
function _sha256(s){
  try{ const crypto=require('crypto'); return crypto.createHash('sha256').update(s).digest('hex'); }catch(e){ return ''; }
}
function _loadLicense(){
  const dir = _licenseDir(); if(!dir) return {activated:[]};

}
function _saveLicense(lic){

}
let LICENSE = _loadLicense();
function isUnlocked(){
  if(!LICENSE.activated||!LICENSE.activated.length) return false;

function activateLicenseKey(input){
  const k = (input||'').trim().toUpperCase();
  if(!k) return {ok:false, msg:'Enter a key'};
  const h = _sha256(k);
  let matched = false;
  for(const pfx of Object.keys(LICENSE_HASHES)){
    if(LICENSE_HASHES[pfx].includes(h)){ matched = true; break; }
  }
  if(!matched) return {ok:false, msg:'Invalid key — check for typos'};
  if(!LICENSE.activated) LICENSE.activated = [];
  if(LICENSE.activated.includes(h)) return {ok:false, msg:'This key is already activated'};
  LICENSE.activated.push(h);

}

const THEME_ORDER=Object.keys(THEMES);

// ── HELPERS ──
function el(tag,props,...kids){const e=document.createElement(tag);for(const[k,v]of Object.entries(props||{})){if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k==='onClick')e.addEventListener('click',v);else if(k==='onInput')e.addEventListener('input',v);else if(k==='onKeydown')e.addEventListener('keydown',v);else if(k==='className')e.className=v;else if(k==='disabled')e.disabled=!!v;else if(k==='placeholder')e.placeholder=v;else if(k==='value'&&tag==='input')e.value=v;else if(k==='type')e.type=v;}kids.flat().forEach(k=>{if(k!=null&&k!==false)e.appendChild(typeof k==='string'?document.createTextNode(k):k);});return e;}
function mk(s){const d=document.createElement('div');Object.assign(d.style,s);return d;}
function copy(x){return JSON.parse(JSON.stringify(x));}
function rgba(h,a){h=h.replace('#','');return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;}

// ── STORAGE (filesystem for Electron, localStorage fallback) ──
const _fs=typeof require!=='undefined'?require('fs'):null;
const _path=typeof require!=='undefined'?require('path'):null;
const _dataDir=(function(){if(!_fs||!_path)return null;const d=_path.join(require('os').homedir(),'Library','Application Support','Tic Tac Toe');try{_fs.mkdirSync(d,{recursive:true});}catch(e){}return d;})();
function loadQuestions(){if(_fs&&_dataDir){try{return JSON.parse(_fs.readFileSync(_path.join(_dataDir,'questions.json'),'utf8'));}catch(e){}}try{const s=localStorage.getItem(QS_KEY);if(s)return JSON.parse(s);}catch(e){}return null;}
function saveQuestions(list){if(_fs&&_dataDir){try{_fs.writeFileSync(_path.join(_dataDir,'questions.json'),JSON.stringify(list));}catch(e){}}try{localStorage.setItem(QS_KEY,JSON.stringify(list));}catch(e){}}

// ── ELECTRON IPC ──
const ipc=(typeof require!=='undefined')?require('electron').ipcRenderer:null;

// ── ROLE (from URL hash) ──
let ROLE=(window.location.hash||'').replace('#','').trim()||null;
let ROOM='LOCAL';
let STATE={
  screen:'setup',
  questions:copy(loadQuestions()||DEFAULT_QUESTIONS),
  board:[null,null,null,null,null,null,null,null,null],
  currentTeam:'X',
  activeCell:null,
  activeQuestion:null,
  winner:null,
  winLine:null,
  themeId:'portal',
};
let editQuestions=copy(loadQuestions()||DEFAULT_QUESTIONS);
let inputQ='',inputA='';
let dbUnsubscribe=null;

function setState(patch){STATE=Object.assign({},STATE,patch);pushState();render();}

// ── IPC SYNC (Electron) ──
function pushState(){if(ipc)ipc.send('ttt-state',STATE);}

function subscribeRoom(){
  if(!ipc)return;
  ipc.on('ttt-state',(event,s)=>{if(s)handleRemoteState(s);});
  ipc.on('ttt-request',()=>{if(ROLE==='operator')pushState();});
  if(ROLE==='audience')ipc.send('ttt-request');
}

let _prevBoard=null,_prevWinner=null,_prevActiveCell=null;
function handleRemoteState(s){
  if(!s)return;
  const pb=_prevBoard,pw=_prevWinner,pac=_prevActiveCell;
  _prevBoard=s.board?[...s.board]:null;_prevWinner=s.winner;_prevActiveCell=s.activeCell;
  STATE=s;
  if(ROLE==='audience'){
    // Detect new X or O placed
    if(pb&&s.board){for(let i=0;i<9;i++){if(!pb[i]&&s.board[i])soundCorrect();}}
    // Detect wrong answer (cell was active, now not, but cell still empty)
    if(pac!==null&&s.activeCell===null&&pb&&s.board&&!s.board[pac])soundWrong();
    // Detect win
    if(s.winner&&s.winner!=='draw'&&!pw){soundWin();setTimeout(spawnConfetti,300);}
    if(s.winner==='draw'&&!pw)soundDraw();
  }
  render();
}

// ── SOUNDS ──
let _ctx=null;
function ac(){if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();if(_ctx.state==='suspended')_ctx.resume();return _ctx;}
function tone(c,type,freq,t0,t1,pk,fd){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type;o.frequency.setValueAtTime(freq,t0);g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(pk,t0+.015);g.gain.setValueAtTime(pk,fd||t0+.015);g.gain.exponentialRampToValueAtTime(.001,t1);o.start(t0);o.stop(t1+.01);}

function soundSelect(){try{const c=ac(),n=c.currentTime;tone(c,'sine',660,n,n+.12,.15,n+.03);tone(c,'sine',880,n+.06,n+.15,.1,n+.08);}catch(e){}}

function soundCorrect(){try{const c=ac(),n=c.currentTime;[[523,0],[659,.1],[784,.2],[1047,.35]].forEach(([f,t])=>{tone(c,'square',f,n+t,n+t+.3,.12,n+t+.06);tone(c,'sine',f,n+t,n+t+.35,.18,n+t+.08);});}catch(e){}}

function soundWrong(){try{const c=ac(),n=c.currentTime;const o1=c.createOscillator(),g1=c.createGain();o1.connect(g1);g1.connect(c.destination);o1.type='sawtooth';o1.frequency.setValueAtTime(311,n);o1.frequency.exponentialRampToValueAtTime(233,n+.45);g1.gain.setValueAtTime(.2,n);g1.gain.exponentialRampToValueAtTime(.001,n+.5);o1.start(n);o1.stop(n+.55);const o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o2.type='sawtooth';o2.frequency.setValueAtTime(233,n+.55);o2.frequency.exponentialRampToValueAtTime(147,n+1.3);g2.gain.setValueAtTime(.2,n+.55);g2.gain.exponentialRampToValueAtTime(.001,n+1.4);o2.start(n+.55);o2.stop(n+1.45);}catch(e){}}

function soundWin(){try{const c=ac(),n=c.currentTime;[[392,0],[523,.15],[659,.3],[784,.48],[880,.63],[1047,.82]].forEach(([f,t],i)=>{const v=.12+i*.03;tone(c,'square',f,n+t,n+t+.5,v*.6,n+t+.1);tone(c,'sine',f,n+t,n+t+.6,v,n+t+.12);tone(c,'sine',f*2,n+t+.02,n+t+.45,v*.3,n+t+.08);});[1047,1319,1568].forEach(f=>{tone(c,'sine',f,n+1.0,n+2.2,.1,n+1.3);});}catch(e){}}

function soundDraw(){try{const c=ac(),n=c.currentTime;tone(c,'triangle',440,n,n+.6,.15,n+.1);tone(c,'triangle',349,n+.3,n+.9,.12,n+.4);}catch(e){}}

// ── CONFETTI ──
function spawnConfetti(){
  if(document.querySelector('.conf'))return;
  const colors=STATE.winner==='X'?['#22d3ee','#06b6d4','#fff','#67e8f9','#0891b2','#a5f3fc']:['#f59e0b','#d97706','#fff','#fbbf24','#b45309','#fde68a'];
  const l=mk({position:'fixed',top:'0',left:'0',width:'100%',height:'100%',pointerEvents:'none',overflow:'hidden',zIndex:'999'});
  l.className='conf';
  for(let i=0;i<80;i++){const s=(6+Math.random()*14)+'px';l.appendChild(mk({position:'absolute',left:Math.floor(Math.random()*100)+'%',top:'-25px',width:s,height:s,background:colors[i%colors.length],borderRadius:Math.random()>.5?'50%':'2px',animation:`confFall ${2+Math.random()*2.5}s ${Math.random()*2}s ease-in forwards`}));}
  document.getElementById('app').appendChild(l);
  setTimeout(()=>l.remove(),6000);
}

// ── WIN CHECK ──
function checkWin(board){
  for(const[a,b,c]of WIN_LINES){if(board[a]&&board[a]===board[b]&&board[b]===board[c])return{winner:board[a],line:[a,b,c]};}
  if(board.every(cell=>cell!==null))return{winner:'draw',line:null};
  return null;
}

// ── RENDER ──
function render(){
  if(ROLE==='operator' && !isUnlocked()){ renderLockScreen(); return; }

  const app=document.getElementById('app');app.innerHTML='';
  if(ROLE==='operator')app.appendChild(buildOperator());
  else if(ROLE==='audience')app.appendChild(buildAudience());
  else app.appendChild(buildOperator());
}

// ── LOBBY ──
function buildLobby(){
  const wrap=mk({});wrap.id='lobby';
  const title=mk({});title.className='lobby-title';title.textContent='TIC TAC TOE';
  const sub=mk({});sub.className='lobby-sub';sub.textContent='Trivia Team Battle';
  wrap.appendChild(title);wrap.appendChild(sub);
  const card=mk({});card.className='lobby-card';
  const createLabel=mk({});createLabel.className='lobby-label';createLabel.textContent='Start a new game as Operator';
  const createBtn=el('button',{className:'btn-primary',onClick:async()=>{ac();ROOM=makeCode();ROLE='operator';await pushState();subscribeRoom();render();}});
  createBtn.textContent='▶ CREATE ROOM';
  card.appendChild(createLabel);card.appendChild(createBtn);
  const div=mk({});div.className='lobby-divider';div.textContent='OR';card.appendChild(div);
  const joinLabel=mk({});joinLabel.className='lobby-label';joinLabel.textContent='Join as Audience Screen';
  let joinCode='';
  const joinInput=el('input',{className:'lobby-input',placeholder:'ENTER ROOM CODE',type:'text',onInput:e=>{joinCode=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4);joinInput.value=joinCode;},onKeydown:e=>{if(e.key==='Enter')doJoin();}});
  const joinBtn=el('button',{className:'btn-secondary',onClick:doJoin});joinBtn.textContent='JOIN AUDIENCE';
  function doJoin(){if(joinCode.length<4)return;ac();ROOM=joinCode;ROLE='audience';subscribeRoom();render();}
  card.appendChild(joinLabel);card.appendChild(joinInput);card.appendChild(joinBtn);
  wrap.appendChild(card);return wrap;
}

// ── OPERATOR ──
function buildOperator(){
  const wrap=mk({});wrap.id='operator';

  if(STATE.screen==='setup'){
    // Top bar
    const topbar=mk({});topbar.className='op-topbar';
    const left=mk({display:'flex',flexDirection:'column'});
    const titleEl=mk({});titleEl.className='op-title';titleEl.textContent='TIC TAC TOE';
    const roomEl=mk({});roomEl.className='op-room';roomEl.textContent='v'+APP_VERSION;
    left.appendChild(titleEl);left.appendChild(roomEl);
    const topBtns=mk({});topBtns.className='op-topbtns';
    const greenBtn=el('button',{className:'op-btn',style:{color:'var(--green)',borderColor:'rgba(74,222,128,.3)',fontSize:'14px'},onClick:()=>{if(ipc)ipc.send('toggle-audience',true);}});greenBtn.textContent='🟢';topBtns.appendChild(greenBtn);
    const redBtn=el('button',{className:'op-btn',style:{color:'var(--red)',borderColor:'rgba(239,68,68,.3)',fontSize:'14px'},onClick:()=>{if(ipc)ipc.send('toggle-audience',false);}});redBtn.textContent='🔴';topBtns.appendChild(redBtn);
    topbar.appendChild(left);topbar.appendChild(topBtns);wrap.appendChild(topbar);

    const scroll=mk({});scroll.className='op-scroll';

    // Theme picker
    const themeLabel=mk({});themeLabel.className='section-label';themeLabel.textContent='Theme';scroll.appendChild(themeLabel);
    const themeBar=mk({});themeBar.className='theme-bar';
    THEME_ORDER.forEach(tid=>{const t=THEMES[tid],active=STATE.themeId===tid;const chip=el('button',{className:'theme-chip'+(active?' active':''),onClick:()=>setState({themeId:tid})});chip.textContent=t.e;themeBar.appendChild(chip);});
    scroll.appendChild(themeBar);

    // Question list
    const qLabel=mk({});qLabel.className='section-label';qLabel.textContent=`Questions (${editQuestions.length})`;scroll.appendChild(qLabel);
    const list=mk({});list.className='q-list';
    editQuestions.forEach((q,i)=>{
      const row=mk({});row.className='q-row';
      const info=mk({});info.className='q-info';
      const qt=mk({});qt.className='q-text';qt.textContent=q.q;info.appendChild(qt);
      const qa=mk({});qa.className='q-answer';qa.textContent='Answer: '+q.a;info.appendChild(qa);
      const del=el('button',{className:'del-btn',onClick:()=>{editQuestions.splice(i,1);saveQuestions(editQuestions);render();}});del.textContent='✕';
      row.appendChild(info);row.appendChild(del);list.appendChild(row);
    });
    scroll.appendChild(list);

    // Add question
    const addWrap=mk({display:'flex',flexDirection:'column',gap:'8px'});
    const qi=el('input',{className:'add-input',placeholder:'Type a question...',type:'text',onInput:e=>{inputQ=e.target.value;},onKeydown:e=>{if(e.key==='Enter')addQ();}});qi.value=inputQ;
    const ai=el('input',{className:'add-input ans-input',placeholder:'Answer',type:'text',onInput:e=>{inputA=e.target.value;},onKeydown:e=>{if(e.key==='Enter')addQ();}});ai.value=inputA;
    function addQ(){if(!inputQ.trim()||!inputA.trim())return;editQuestions.push({q:inputQ.trim(),a:inputA.trim()});saveQuestions(editQuestions);inputQ='';inputA='';render();}
    const addBtns=mk({display:'flex',gap:'8px'});
    const addBtn=el('button',{className:'add-btn',onClick:addQ});addBtn.textContent='+ Add';
    addBtns.appendChild(addBtn);addWrap.appendChild(qi);addWrap.appendChild(ai);addWrap.appendChild(addBtns);
    scroll.appendChild(addWrap);

    // Start button
    const startBtn=el('button',{className:'start-btn',onClick:()=>{
      if(editQuestions.length<5){alert('Add at least 5 questions.');return;}
      saveQuestions(editQuestions);
      // Shuffle questions and assign to cells
      const shuffled=copy(editQuestions);for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
      setState({screen:'game',questions:copy(editQuestions),board:[null,null,null,null,null,null,null,null,null],currentTeam:'X',activeCell:null,activeQuestion:null,winner:null,winLine:null,_shuffledQs:shuffled,_qIndex:0});
    }});
    startBtn.textContent='▶ START GAME';scroll.appendChild(startBtn);
    wrap.appendChild(scroll);return wrap;
  }

  // ── GAME SCREEN ──
  const{board,currentTeam,activeCell,activeQuestion,winner}=STATE;
  const xCount=board.filter(c=>c==='X').length;
  const oCount=board.filter(c=>c==='O').length;

  // Top bar
  const topbar=mk({});topbar.className='op-topbar';
  const left=mk({display:'flex',flexDirection:'column'});
  const titleEl=mk({});titleEl.className='op-title';titleEl.textContent='TIC TAC TOE';
  const roomEl=mk({});roomEl.className='op-room';roomEl.textContent=`X: ${xCount}  ·  O: ${oCount}`;
  left.appendChild(titleEl);left.appendChild(roomEl);
  const btns=mk({});btns.className='op-topbtns';
  const greenBtn2=el('button',{className:'op-btn',style:{color:'var(--green)',borderColor:'rgba(74,222,128,.3)',fontSize:'14px'},onClick:()=>{if(ipc)ipc.send('toggle-audience',true);}});greenBtn2.textContent='🟢';btns.appendChild(greenBtn2);
  const redBtn2=el('button',{className:'op-btn',style:{color:'var(--red)',borderColor:'rgba(239,68,68,.3)',fontSize:'14px'},onClick:()=>{if(ipc)ipc.send('toggle-audience',false);}});redBtn2.textContent='🔴';btns.appendChild(redBtn2);
  const setupBtn=el('button',{className:'op-btn',onClick:()=>setState({screen:'setup',board:[null,null,null,null,null,null,null,null,null],currentTeam:'X',activeCell:null,activeQuestion:null,winner:null,winLine:null})});
  setupBtn.textContent='⚙ Setup';btns.appendChild(setupBtn);
  topbar.appendChild(left);topbar.appendChild(btns);wrap.appendChild(topbar);

  // Team indicator
  if(!winner){
    const teamInd=mk({});teamInd.className='team-indicator team-'+currentTeam;
    teamInd.textContent=activeCell!==null?`TEAM ${currentTeam} IS ANSWERING...`:`TEAM ${currentTeam}'S TURN`;
    wrap.appendChild(teamInd);
  }

  // Active question display
  if(activeCell!==null&&activeQuestion){
    const qBox=mk({});qBox.className='op-question';
    const qText=mk({});qText.className='op-q-text';qText.textContent='Q: '+activeQuestion.q;qBox.appendChild(qText);
    const aText=mk({});aText.className='op-a-text';aText.textContent='A: '+activeQuestion.a;qBox.appendChild(aText);

    const ctrl=mk({});ctrl.className='ctrl-bar';
    const correctBtn=el('button',{className:'ctrl-btn correct',onClick:()=>{
      const newBoard=[...board];newBoard[activeCell]=currentTeam;
      const result=checkWin(newBoard);
      const nextTeam=currentTeam==='X'?'O':'X';
      soundCorrect();
      if(result){
        if(result.winner!=='draw'){soundWin();setTimeout(spawnConfetti,300);}else soundDraw();
        setState({board:newBoard,activeCell:null,activeQuestion:null,winner:result.winner,winLine:result.line});
      }else{
        setState({board:newBoard,activeCell:null,activeQuestion:null,currentTeam:nextTeam});
      }
    }});correctBtn.textContent='✅ CORRECT';ctrl.appendChild(correctBtn);
    const wrongBtn=el('button',{className:'ctrl-btn wrong',onClick:()=>{
      soundWrong();
      const nextTeam=currentTeam==='X'?'O':'X';
      setState({activeCell:null,activeQuestion:null,currentTeam:nextTeam});
    }});wrongBtn.textContent='❌ WRONG';ctrl.appendChild(wrongBtn);
    wrap.appendChild(qBox);wrap.appendChild(ctrl);
  }

  // Scroll area
  const scroll=mk({});scroll.className='op-scroll';

  // Winner display
  if(winner){
    const winBox=mk({textAlign:'center',padding:'20px',marginBottom:'16px'});
    const winText=mk({fontFamily:'"Black Ops One",sans-serif',fontSize:'28px',letterSpacing:'4px'});
    if(winner==='draw'){winText.textContent='DRAW!';winText.style.color='#888';}
    else{winText.textContent=`TEAM ${winner} WINS!`;winText.style.color=winner==='X'?'var(--teamX)':'var(--teamO)';}
    winBox.appendChild(winText);
    const newGameBtn=el('button',{className:'start-btn',style:{marginTop:'12px'},onClick:()=>{
      const shuffled=copy(STATE.questions);for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
      setState({board:[null,null,null,null,null,null,null,null,null],currentTeam:'X',activeCell:null,activeQuestion:null,winner:null,winLine:null,_shuffledQs:shuffled,_qIndex:0});
    }});newGameBtn.textContent='🔄 NEW GAME';winBox.appendChild(newGameBtn);
    scroll.appendChild(winBox);
  }

  // Grid
  const grid=mk({});grid.className='op-grid';
  for(let i=0;i<9;i++){
    const cell=board[i];
    const isActive=activeCell===i;
    const cellEl=el('button',{
      className:'op-cell'+(cell?' taken-'+cell:'')+(isActive?' active-cell':''),
      disabled:!!cell||!!winner||activeCell!==null,
      onClick:()=>{
        if(cell||winner||activeCell!==null)return;
        soundSelect();
        // Pick next question from shuffled list
        const sqs=STATE._shuffledQs||copy(STATE.questions);
        let qi=(STATE._qIndex||0)%sqs.length;
        const q=sqs[qi];
        setState({activeCell:i,activeQuestion:q,_qIndex:qi+1});
      }
    });
    cellEl.textContent=cell||String(i+1);
    grid.appendChild(cellEl);
  }
  scroll.appendChild(grid);
  wrap.appendChild(scroll);return wrap;
}

// ── AUDIENCE ──
function buildAudience(){
  const wrap=mk({});wrap.id='audience';
  const glow=mk({});glow.className='aud-glow';wrap.appendChild(glow);

  if(STATE.screen==='setup'||!STATE.board){
    const w=mk({});w.className='waiting';
    const label=mk({});label.className='waiting-label';label.textContent='TIC TAC TOE';
    const code=mk({});code.className='waiting-code';code.textContent='✕◯';code.style.fontSize='clamp(48px,12vw,96px)';
    const sub=mk({});sub.className='waiting-label';sub.textContent='Waiting for game to start...';
    w.appendChild(label);w.appendChild(code);w.appendChild(sub);
    wrap.appendChild(w);return wrap;
  }

  const{board,currentTeam,activeCell,activeQuestion,winner,winLine}=STATE;
  const winSet=new Set(winLine||[]);

  // Question overlay
  if(activeCell!==null&&activeQuestion&&!winner){
    const overlay=mk({});overlay.className='aud-question-overlay';
    const qText=mk({});qText.className='aud-q-text';qText.textContent=activeQuestion.q;
    const teamText=mk({});teamText.className='aud-q-team';
    teamText.textContent=`TEAM ${currentTeam} IS ANSWERING...`;
    teamText.style.color=currentTeam==='X'?'var(--teamX)':'var(--teamO)';
    overlay.appendChild(qText);overlay.appendChild(teamText);
    wrap.appendChild(overlay);
    return wrap;
  }

  // Win overlay
  if(winner){
    // Still show grid behind
    const gridWrap=mk({position:'relative',zIndex:'1'});
    gridWrap.appendChild(buildAudGrid(board,winSet));
    wrap.appendChild(gridWrap);

    const overlay=mk({});overlay.className='win-overlay';
    const winText=mk({});winText.className='win-text';
    if(winner==='draw'){winText.textContent='DRAW!';winText.style.color='#888';}
    else{winText.textContent=`TEAM ${winner} WINS!`;winText.style.color=winner==='X'?'var(--teamX)':'var(--teamO)';winText.style.textShadow=`0 0 40px ${winner==='X'?'rgba(34,211,238,.6)':'rgba(245,158,11,.6)'}`;}
    overlay.appendChild(winText);
    wrap.appendChild(overlay);
    return wrap;
  }

  // Team indicator
  const teamInd=mk({fontFamily:'"Black Ops One",sans-serif',fontSize:'clamp(18px,4vw,32px)',letterSpacing:'4px',marginBottom:'clamp(12px,2vw,24px)',textAlign:'center'});
  teamInd.textContent=`TEAM ${currentTeam}'S TURN`;
  teamInd.style.color=currentTeam==='X'?'var(--teamX)':'var(--teamO)';
  teamInd.style.textShadow=`0 0 20px ${currentTeam==='X'?'rgba(34,211,238,.4)':'rgba(245,158,11,.4)'}`;
  wrap.appendChild(teamInd);

  // Grid
  wrap.appendChild(buildAudGrid(board,winSet));
  return wrap;
}

function buildAudGrid(board,winSet){
  const grid=mk({});grid.className='aud-grid';
  for(let i=0;i<9;i++){
    const cell=board[i];
    const isWin=winSet.has(i);
    const cellEl=mk({});
    cellEl.className='aud-cell'+(cell?' '+cell:' number')+(isWin?' win-cell':'')+(STATE.activeCell===i?' active-q':'');
    if(cell){
      cellEl.textContent=cell;
      cellEl.style.animation='cellReveal .5s cubic-bezier(.34,1.4,.64,1) forwards';
      if(isWin){
        cellEl.style.boxShadow=cell==='X'?'0 0 30px rgba(34,211,238,.6),inset 0 0 20px rgba(34,211,238,.2)':'0 0 30px rgba(245,158,11,.6),inset 0 0 20px rgba(245,158,11,.2)';
      }
    }else{
      cellEl.textContent=String(i+1);
    }
    grid.appendChild(cellEl);
  }
  return grid;
}

// ── INIT ──
function init(){
  subscribeRoom();
  render();
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
